<!DOCTYPE html>
<html lang="ur">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NEXA AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #080800; font-family: 'Rajdhani', sans-serif; color: white; overflow: hidden; }

    /* LOGIN */
    #loginScreen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #080800; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; gap: 40px; }
    .login-logo { font-family: 'Orbitron', monospace; font-size: 3rem; font-weight: 900; background: linear-gradient(90deg, #f5c842, #fff7c0, #f5c842); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: goldShine 3s linear infinite; letter-spacing: 8px; }
    @keyframes goldShine { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
    .login-subtitle { font-size: 0.85rem; color: rgba(245,200,66,0.5); letter-spacing: 3px; text-transform: uppercase; font-family: 'Orbitron', monospace; margin-top: -30px; }
    .login-card { background: rgba(245,200,66,0.04); border: 1px solid rgba(245,200,66,0.15); border-radius: 20px; padding: 40px 50px; display: flex; flex-direction: column; align-items: center; gap: 20px; backdrop-filter: blur(10px); }
    .login-card p { font-size: 0.9rem; color: rgba(255,255,255,0.4); letter-spacing: 1px; text-align: center; }
    .google-btn { display: flex; align-items: center; gap: 12px; padding: 14px 28px; border-radius: 50px; border: 1px solid rgba(245,200,66,0.4); background: rgba(245,200,66,0.08); color: rgba(245,200,66,0.95); font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: 'Orbitron', monospace; letter-spacing: 1px; transition: all 0.3s; }
    .google-btn:hover { background: rgba(245,200,66,0.15); transform: scale(1.03); }
    .login-by { font-size: 0.7rem; color: rgba(245,200,66,0.3); letter-spacing: 2px; }

    /* INTRO */
    #introScreen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #080800; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 999; gap: 16px; }
    .intro-welcome { font-family: 'Orbitron', monospace; font-size: clamp(1.8rem, 8vw, 3.5rem); font-weight: 900; background: linear-gradient(90deg, #f5c842, #fff7c0, #f5c842); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: goldShine 2s linear infinite; letter-spacing: clamp(4px, 2vw, 10px); opacity: 0; width: 100%; text-align: center; padding: 0 16px; }
    .intro-name { font-family: 'Orbitron', monospace; font-size: 1.8rem; font-weight: 700; color: rgba(255,255,255,0.9); letter-spacing: 4px; opacity: 0; }
    .intro-tagline { font-size: 1rem; color: rgba(245,200,66,0.7); letter-spacing: 3px; text-transform: uppercase; opacity: 0; }
    .intro-by { font-size: 0.72rem; color: rgba(245,200,66,0.4); letter-spacing: 2px; margin-top: 8px; opacity: 0; }
    .intro-line { width: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(245,200,66,0.6), transparent); margin: 8px 0; }

    /* MAIN APP */
    #mainApp { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: none; flex-direction: column; opacity: 0; }

    /* TOP BAR */
    .top-bar { padding: 10px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(245,200,66,0.1); background: rgba(10,8,0,0.95); backdrop-filter: blur(20px); flex-shrink: 0; z-index: 10; }
    .menu-btn { width: 34px; height: 34px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; cursor: pointer; border: none; background: transparent; flex-shrink: 0; }
    .menu-btn span { width: 20px; height: 2px; background: rgba(245,200,66,0.7); border-radius: 2px; box-shadow: 0 0 6px rgba(245,200,66,0.5); }
    .top-title { flex: 1; font-family: 'Orbitron', monospace; font-size: 0.95rem; font-weight: 900; background: linear-gradient(90deg, #f5c842, #fff7c0, #f5c842); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: goldShine 3s linear infinite; letter-spacing: 4px; }
    .top-right { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(245,200,66,0.4); object-fit: cover; cursor: pointer; }
    .new-chat-btn { font-size: 0.55rem; color: rgba(245,200,66,0.6); font-family: 'Orbitron', monospace; letter-spacing: 0.5px; cursor: pointer; background: rgba(245,200,66,0.08); border: 1px solid rgba(245,200,66,0.2); border-radius: 6px; padding: 2px 6px; transition: all 0.2s; white-space: nowrap; }
    .new-chat-btn:hover { background: rgba(245,200,66,0.15); color: rgba(245,200,66,0.9); }

    /* SPHERE */.sphere-area { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; padding: 20px 0 10px; position: relative; flex: 1; justify-content: center; }
    .sphere-wrapper { position: relative; width: 160px; height: 160px; opacity: 0; }
    @keyframes sphereDrop { 0% { opacity: 0; transform: translateY(-60px) scale(0.5); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
    .sphere { width: 160px; height: 160px; border-radius: 50%; position: relative; background: radial-gradient(circle at 35% 35%, rgba(255,220,100,0.15), rgba(180,140,0,0.4) 40%, rgba(60,40,0,0.9) 70%, rgba(10,8,0,1) 100%); box-shadow: 0 0 40px rgba(245,200,66,0.4), 0 0 80px rgba(200,160,0,0.2), inset 0 0 40px rgba(150,100,0,0.5); animation: sphereIdle 4s ease-in-out infinite; overflow: hidden; }
    @keyframes sphereIdle { 0%,100% { box-shadow: 0 0 40px rgba(245,200,66,0.4), 0 0 80px rgba(200,160,0,0.2), inset 0 0 40px rgba(150,100,0,0.5); } 50% { box-shadow: 0 0 60px rgba(255,220,80,0.6), 0 0 120px rgba(220,180,0,0.3), inset 0 0 60px rgba(180,130,0,0.6); } }
    .sphere.processing { animation: sphereProcess 0.6s ease-in-out infinite; }
    @keyframes sphereProcess { 0%,100% { box-shadow: 0 0 60px rgba(255,220,80,0.8), 0 0 120px rgba(245,200,66,0.5), inset 0 0 60px rgba(200,150,0,0.7); transform: scale(1); } 50% { box-shadow: 0 0 100px rgba(255,230,100,1), 0 0 180px rgba(245,200,66,0.7), inset 0 0 80px rgba(220,170,0,0.8); transform: scale(1.04); } }
    #sphereCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; opacity: 0.8; }
    .sphere-shine { position: absolute; top: 15%; left: 20%; width: 35%; height: 25%; background: radial-gradient(ellipse, rgba(255,255,200,0.2), transparent); border-radius: 50%; pointer-events: none; }
    .sphere-ring { position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px; border-radius: 50%; border: 1px solid rgba(245,200,66,0.3); animation: ringPulse 3s ease-in-out infinite; }
    .sphere-ring2 { position: absolute; top: -20px; left: -20px; right: -20px; bottom: -20px; border-radius: 50%; border: 1px solid rgba(245,200,66,0.15); animation: ringPulse 3s ease-in-out infinite 1s; }
    @keyframes ringPulse { 0%,100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.02); } }

    /* CHAT AREA */
    #chatArea { flex: 0 1 auto; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; scrollbar-width: thin; scrollbar-color: rgba(245,200,66,0.2) transparent; min-height: 0; max-height: 50vh; }
    #chatArea::-webkit-scrollbar { width: 3px; }
    #chatArea::-webkit-scrollbar-thumb { background: rgba(245,200,66,0.2); border-radius: 2px; }

    .msg-row { display: flex; animation: msgIn 0.3s ease; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.ai { justify-content: flex-start; }

    .msg-bubble { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 0.9rem; line-height: 1.6; word-break: break-word; }
    .msg-row.user .msg-bubble { background: rgba(245,200,66,0.12); border: 1px solid rgba(245,200,66,0.25); border-bottom-right-radius: 4px; color: rgba(255,255,255,0.92); }
    .msg-row.ai .msg-bubble { background: rgba(100,80,0,0.15); border: 1px solid rgba(200,160,0,0.2); border-bottom-left-radius: 4px; color: rgba(255,255,255,0.92); }

    .typing-bubble { display: flex; gap: 5px; padding: 12px 16px; background: rgba(100,80,0,0.15); border: 1px solid rgba(200,160,0,0.2); border-radius: 18px; border-bottom-left-radius: 4px; width: fit-content; }
    .typing-bubble span { width: 7px; height: 7px; background: rgba(245,200,66,0.7); border-radius: 50%; box-shadow: 0 0 6px rgba(245,200,66,0.7); animation: typingDot 1.2s ease-in-out infinite; }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingDot { 0%,60%,100% { transform: translateY(0); opacity: 0.3; } 30% { transform: translateY(-6px); opacity: 1; } }

    /* CHAT BAR */
    .chat-bar { flex-shrink: 0; padding: 10px 14px; background: rgba(10,8,0,0.97); border-top: 1px solid rgba(245,200,66,0.12); opacity: 0; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .chat-bar-inner { display: flex; align-items: center; gap: 8px; max-width: 800px; margin: 0 auto; }
    #textInput { flex: 1; padding: 11px 18px; background: rgba(245,200,66,0.05); border: 1px solid rgba(245,200,66,0.2); border-radius: 50px; color: white; font-size: 0.9rem; outline: none; font-family: 'Rajdhani', sans-serif; transition: all 0.3s; }
    #textInput::placeholder { color: rgba(245,200,66,0.3); }
    #textInput:focus { border-color: rgba(245,200,66,0.5); box-shadow: 0 0 15px rgba(245,200,66,0.08); }
    #sendBtn { width: 44px; height: 44px; border-radius: 50%; border: 1px solid rgba(245,200,66,0.3); background: rgba(245,200,66,0.1); color: rgba(245,200,66,0.9); font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
    #sendBtn:hover { background: rgba(245,200,66,0.2); box-shadow: 0 0 15px rgba(245,200,66,0.3); }
    #sendBtn.processing { animation: spinGlow 1s linear infinite; border-color: rgba(245,200,66,0.8); }
    @keyframes spinGlow { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .img-mode-bar { display: none; flex-direction: column; gap: 8px; padding: 8px 0 4px; }
    .img-mode-bar.show { display: flex; }
    .img-mode-inner { display: flex; gap: 8px; align-items: center; }
    #imgPromptInput { flex: 1; padding: 11px 18px; background: rgba(245,200,66,0.05); border: 1px solid rgba(245,200,66,0.2); border-radius: 50px; color: white; font-size: 0.9rem; outline: none; font-family: 'Rajdhani', sans-serif; }
    #imgPromptInput::placeholder { color: rgba(245,200,66,0.3); }
    .img-action-btn { width: 44px; height: 44px; border-radius: 50%; border: 1px solid rgba(245,200,66,0.3); background: rgba(245,200,66,0.1); color: rgba(245,200,66,0.9); font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
    .img-action-btn:hover { background: rgba(245,200,66,0.2); }
    .img-action-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .img-mode-label { font-family: 'Orbitron', monospace; font-size: 0.6rem; color: rgba(245,200,66,0.5); letter-spacing: 2px; text-align: center; }
    .img-btn { width: 40px; height: 40px; border-radius: 50%; border: 1px solid rgba(245,200,66,0.3); background: rgba(245,200,66,0.08); color: rgba(245,200,66,0.8); font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
    .img-btn:hover { background: rgba(245,200,66,0.18); }
    .img-btn.active { background: rgba(245,200,66,0.25); border-color: rgba(245,200,66,0.7); box-shadow: 0 0 12px rgba(245,200,66,0.3); }

    /* SIDEBAR */
    .sidebar-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 200; display: none; opacity: 0; transition: opacity 0.3s; }
    .sidebar-overlay.show { display: block; opacity: 1; }
    .sidebar { position: fixed; top: 0; left: -320px; bottom: 0; width: 300px; background: rgba(8,6,0,0.99); border-right: 1px solid rgba(245,200,66,0.12); z-index: 201; display: flex; flex-direction: column; transition: left 0.35s cubic-bezier(0.4,0,0.2,1); }
    .sidebar.open { left: 0; }
    .sidebar-header { padding: 18px 20px; border-bottom: 1px solid rgba(245,200,66,0.1); display: flex; align-items: center; gap: 12px; }
    .sidebar-avatar { width: 42px; height: 42px; border-radius: 50%; border: 2px solid rgba(245,200,66,0.4); object-fit: cover; }
    .sidebar-user-name { font-family: 'Orbitron', monospace; font-size: 0.78rem; color: rgba(245,200,66,0.9); }
    .sidebar-user-email { font-size: 0.68rem; color: rgba(255,255,255,0.3); margin-top: 2px; }
    .sidebar-title { padding: 14px 20px 8px; font-family: 'Orbitron', monospace; font-size: 0.62rem; color: rgba(245,200,66,0.4); letter-spacing: 2px; text-transform: uppercase; }
    #sidebarHistory { flex: 1; overflow-y: auto; padding: 0 10px; }
    .history-item { padding: 10px 12px; margin-bottom: 5px; background: rgba(245,200,66,0.03); border: 1px solid rgba(245,200,66,0.07); border-radius: 8px; cursor: pointer; transition: all 0.2s; }
    .history-item:hover { background: rgba(245,200,66,0.08); border-color: rgba(245,200,66,0.18); }
    .history-date { font-size: 0.58rem; color: rgba(245,200,66,0.4); font-family: 'Orbitron', monospace; margin-bottom: 3px; }
    .history-preview { font-size: 0.78rem; color: rgba(255,255,255,0.45); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .no-history { text-align: center; color: rgba(255,255,255,0.2); font-size: 0.78rem; padding: 28px 0; }
    .sidebar-footer { padding: 14px 20px; border-top: 1px solid rgba(245,200,66,0.1); }
    .logout-btn { width: 100%; padding: 11px; border-radius: 10px; border: 1px solid rgba(239,68,68,0.25); background: rgba(239,68,68,0.07); color: rgba(239,68,68,0.75); font-size: 0.78rem; cursor: pointer; font-family: 'Orbitron', monospace; letter-spacing: 1px; transition: all 0.2s; }
    .logout-btn:hover { background: rgba(239,68,68,0.14); }

    /* CORNERS & BG */
    .corner { position: fixed; width: 36px; height: 36px; z-index: 2; pointer-events: none; }
    .corner::before, .corner::after { content: ''; position: absolute; background: rgba(245,200,66,0.45); box-shadow: 0 0 6px rgba(245,200,66,0.6); }
    .corner::before { width: 100%; height: 1px; top: 0; left: 0; }
    .corner::after { width: 1px; height: 100%; top: 0; left: 0; }
    .corner-tl { top: 8px; left: 8px; }
    .corner-tr { top: 8px; right: 8px; transform: scaleX(-1); }
    .corner-bl { bottom: 8px; left: 8px; transform: scaleY(-1); }
    .corner-br { bottom: 8px; right: 8px; transform: scale(-1); }
    #bgCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
  </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-logo">NEXA</div>
  <div class="login-subtitle">Your AI Assistant</div>
  <div class="login-card">
    <p>Sign in to continue</p>
    <button class="google-btn" onclick="loginWithGoogle()">🔑 Continue with Google</button>
    <div class="login-by">By Kh. Wali Abdullah Butt</div>
  </div>
</div>

<!-- INTRO -->
<div id="introScreen">
  <div class="intro-welcome" id="introWelcome">WELCOME</div>
  <div class="intro-line" id="introLine"></div>
  <div class="intro-name" id="introName">I am NEXA</div>
  <div class="intro-tagline" id="introTagline">Your AI Assistant</div>
  <div class="intro-by" id="introBy">By Kh. Wali Abdullah Butt</div>
</div>

<!-- MAIN APP -->
<div id="mainApp">
  <div class="top-bar">
    <button class="menu-btn" onclick="openSidebar()">
      <span></span><span></span><span></span>
    </button>
    <div class="top-title">NEXA</div>
    <div class="top-right">
      <img class="user-avatar" id="topAvatar" src="" alt="">
      <div class="new-chat-btn" onclick="newChat()">+ New Chat</div>
    </div>
  </div>

  <!-- Sphere -->
  <div class="sphere-area">
    <div class="sphere-wrapper" id="sphereWrapper">
      <div class="sphere-ring2"></div>
      <div class="sphere-ring"></div>
      <div class="sphere" id="sphere">
        <canvas id="sphereCanvas"></canvas>
        <div class="sphere-shine"></div>
      </div>
    </div>
  </div>

  <!-- Chat Messages -->
  <div id="chatArea"></div>

  <!-- Chat Bar -->
  <div class="chat-bar" id="chatBar">
    <div class="chat-bar-inner">
      <button class="img-btn" id="imgToggleBtn" onclick="toggleImgMode()" title="Image Generator">🎨</button>
      <input type="text" id="textInput" placeholder="Ask NEXA anything..." />
      <button id="sendBtn" onclick="sendText()">➤</button>
    </div>
    <div class="img-mode-bar" id="imgModeBar">
      <div class="img-mode-label">🎨 IMAGE GENERATION MODE</div>
      <div class="img-mode-inner">
        <input type="text" id="imgPromptInput" placeholder="Image describe karo..." onkeydown="if(event.key==='Enter') generateImage()" />
        <button class="img-action-btn" id="imgGenBtn" onclick="generateImage()" title="Generate">✨</button>
        <label class="img-action-btn" title="Upload & Analyze">📷<input type="file" accept="image/*" style="display:none" onchange="analyzeImage(this)"></label>
      </div>
    </div>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <img class="sidebar-avatar" id="sidebarAvatar" src="" alt="">
    <div>
      <div class="sidebar-user-name" id="sidebarName">User</div>
      <div class="sidebar-user-email" id="sidebarEmail"></div>
    </div>
  </div>
  <div class="sidebar-title">Recent Chats</div>
  <div id="sidebarHistory"></div>
  <div class="sidebar-footer">
    <button class="logout-btn" onclick="logoutUser()">⬡ LOGOUT</button>
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
  import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, query, where, getDocs, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyCLosHSZulEZW1ustqAXk8XfpLNWkjKyhw",
    authDomain: "butts-ai-assistant.firebaseapp.com",
    projectId: "butts-ai-assistant",
    storageBucket: "butts-ai-assistant.firebasestorage.app",
    messagingSenderId: "212491212408",
    appId: "1:212491212408:web:7bf79f2d3321674a6d7f8d"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById('loginScreen').style.display = 'none';
      showIntro(user);
      document.getElementById('topAvatar').src = user.photoURL || '';
      document.getElementById('sidebarAvatar').src = user.photoURL || '';
      document.getElementById('sidebarName').textContent = user.displayName || 'User';
      document.getElementById('sidebarEmail').textContent = user.email || '';
    } else {
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('introScreen').style.display = 'none';
      document.getElementById('mainApp').style.display = 'none';
      document.getElementById('mainApp').style.opacity = '0';
    }
  });

  window.loginWithGoogle = async () => {
    try { await signInWithPopup(auth, provider); } catch(e) { console.error(e); }
  };

  window.logoutUser = async () => {
    await signOut(auth); closeSidebar();
  };

  // Load system prompt from Firestore
  async function loadPromptFromDB() {
    try {
      const snap = await getDocs(query(collection(db, 'settings')));
      snap.forEach(d => {
        if (d.id === 'system_prompt' && d.data().prompt) {
          window.SYSTEM_PROMPT = d.data().prompt;
        }
      });
    } catch(e) { console.error('Prompt load error:', e); }
  }
  loadPromptFromDB();

  window.startNewConversation = async () => {
    const user = auth.currentUser;
    if (!user) return null;
    try {
      const ref = await addDoc(collection(db, 'conversations'), {
        userId: user.uid,
        userEmail: user.email,
        messages: [],
        lastMessage: '',
        lastUpdated: serverTimestamp(),
        createdAt: serverTimestamp()
      });
      return ref.id;
    } catch(e) { console.error('Conv error:', e); return null; }
  };

  window.saveMessage = async (userText, aiText) => {
    const user = auth.currentUser;
    if (!user || !window.currentConvId) return;
    try {
      const convRef = doc(db, 'conversations', window.currentConvId);
      const snap = await getDocs(query(collection(db, 'conversations'), where('userId','==',user.uid)));
      let messages = [];
      snap.forEach(d => { if(d.id === window.currentConvId) messages = d.data().messages || []; });
      messages.push({ userText, aiText, time: new Date().toISOString() });
      await updateDoc(convRef, {
        messages,
        lastMessage: userText,
        lastUpdated: serverTimestamp()
      });
    } catch(e) { console.error('Save error:', e); }
  };

  window.loadSidebarHistory = async () => {
    const user = auth.currentUser;
    const container = document.getElementById('sidebarHistory');
    if (!user) { container.innerHTML = '<div class="no-history">Login required</div>'; return; }
    try {
      container.innerHTML = '<div class="no-history">Loading...</div>';
      const q = query(collection(db, 'conversations'), where('userId','==',user.uid));
      const snap = await getDocs(q);
      if (snap.empty) { container.innerHTML = '<div class="no-history">No chats yet</div>'; return; }

      let convs = [];
      snap.forEach(d => convs.push({ id: d.id, ...d.data() }));
      convs.sort((a,b) => (b.lastUpdated?.seconds||0) - (a.lastUpdated?.seconds||0));

      container.innerHTML = '';
      convs.forEach(conv => {
        const messages = conv.messages || [];
        if (messages.length === 0) return;
        const lastMsg = messages[messages.length-1];
        const date = conv.lastUpdated?.toDate?.();
        const dateStr = date ? date.toLocaleDateString()+' '+date.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '';

        const div = document.createElement('div');
        div.className = 'history-item';
        div.style.position = 'relative';
        div.innerHTML = `
          <div class="history-date">${dateStr}</div>
          <div class="history-preview">▶ ${lastMsg.userText || ''}</div>
          <div style="position:absolute;top:8px;right:8px;font-size:0.7rem;color:rgba(255,80,80,0.6);cursor:pointer;padding:2px 6px;border:1px solid rgba(255,80,80,0.2);border-radius:4px" onclick="event.stopPropagation();deleteConv('${conv.id}')">🗑</div>
        `;
        div.onclick = () => {
          closeSidebar();
          document.getElementById('chatArea').innerHTML = '';
          window.currentConvId = conv.id;
          messages.forEach(m => {
            addMsg(m.userText, 'user');
            addMsg(m.aiText, 'ai');
          });
        };
        container.appendChild(div);
      });
    } catch(e) {
      console.error('Load error:', e);
      container.innerHTML = '<div class="no-history">Error: ' + e.message + '</div>';
    }
  };

  window.deleteConv = async (convId) => {
    try {
      await deleteDoc(doc(db, 'conversations', convId));
      window.loadSidebarHistory();
    } catch(e) { console.error('Delete error:', e); }
  };
</script>

  // Background
  const bgCanvas = document.getElementById('bgCanvas');
  const bgCtx = bgCanvas.getContext('2d');
  function resizeBg() { bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight; }
  resizeBg(); window.addEventListener('resize', resizeBg);
  const stars = Array.from({length:120}, ()=>({ x:Math.random()*bgCanvas.width, y:Math.random()*bgCanvas.height, size:Math.random()*1.5+0.3, opacity:Math.random()*0.5+0.1, twinkle:Math.random()*Math.PI*2 }));
  const bgP = Array.from({length:18}, ()=>({ x:Math.random()*bgCanvas.width, y:Math.random()*bgCanvas.height, vx:(Math.random()-0.5)*0.25, vy:(Math.random()-0.5)*0.25, size:Math.random()*1.8+0.4, color:Math.random()>0.5?'245,200,66':'200,160,0' }));
  function animateBg() {
    bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
    stars.forEach(s=>{ s.twinkle+=0.015; const op=s.opacity*(0.7+0.3*Math.sin(s.twinkle)); bgCtx.beginPath(); bgCtx.arc(s.x,s.y,s.size,0,Math.PI*2); bgCtx.fillStyle=`rgba(255,240,180,${op})`; bgCtx.fill(); });
    bgP.forEach(p=>{ bgCtx.beginPath(); bgCtx.arc(p.x,p.y,p.size,0,Math.PI*2); bgCtx.fillStyle=`rgba(${p.color},0.2)`; bgCtx.shadowBlur=6; bgCtx.shadowColor=`rgba(${p.color},0.8)`; bgCtx.fill(); bgCtx.shadowBlur=0; p.x+=p.vx; p.y+=p.vy; if(p.x<0||p.x>bgCanvas.width)p.vx*=-1; if(p.y<0||p.y>bgCanvas.height)p.vy*=-1; });
    requestAnimationFrame(animateBg);
  }
  animateBg();

  // Sphere canvas
  const sc = document.getElementById('sphereCanvas');
  const sCtx = sc.getContext('2d');
  sc.width=160; sc.height=160;
  let waveAmp=5, targetAmp=5, waveFrame=0, isProcessing=false;
  function animateSphere() {
    sCtx.clearRect(0,0,160,160); waveFrame+=0.05;
    waveAmp+=(targetAmp-waveAmp)*0.1;
    [{color:'rgba(255,200,50,0.6)',offset:0,freq:2},{color:'rgba(200,150,0,0.5)',offset:Math.PI/3,freq:3},{color:'rgba(255,220,80,0.4)',offset:Math.PI/1.5,freq:1.5}].forEach(w=>{
      sCtx.beginPath();
      for(let x=0;x<=160;x+=2){
        const y=80+Math.sin(x*0.04*w.freq+waveFrame+w.offset)*waveAmp+Math.sin(x*0.02+waveFrame*0.7+w.offset)*(waveAmp*0.5);
        if(x===0)sCtx.moveTo(x,y);else sCtx.lineTo(x,y);
      }
      sCtx.strokeStyle=w.color; sCtx.lineWidth=2; sCtx.shadowBlur=10; sCtx.shadowColor=w.color; sCtx.stroke(); sCtx.shadowBlur=0;
    });
    requestAnimationFrame(animateSphere);
  }
  animateSphere();

  // Intro
  function showIntro(user) {
    const intro = document.getElementById('introScreen');
    intro.style.display = 'flex';
    setTimeout(()=>{ const w=document.getElementById('introWelcome'); w.style.transition='opacity 0.8s'; w.style.opacity='1'; },300);
    setTimeout(()=>{ const l=document.getElementById('introLine'); l.style.transition='width 0.6s'; l.style.width='200px'; },1200);
    setTimeout(()=>{ const n=document.getElementById('introName'); n.style.transition='opacity 0.6s'; n.style.opacity='1'; },1600);
    setTimeout(()=>{ const t=document.getElementById('introTagline'); t.style.transition='opacity 0.6s'; t.style.opacity='1'; },2100);
    setTimeout(()=>{ const b=document.getElementById('introBy'); b.style.transition='opacity 0.6s'; b.style.opacity='1'; },2500);
    setTimeout(()=>{ intro.style.transition='opacity 0.8s'; intro.style.opacity='0'; },3500);
    setTimeout(()=>{
      intro.style.display='none';
      const mainApp=document.getElementById('mainApp');

      document.getElementById('sphereWrapper').style.animation='sphereDrop 0.8s cubic-bezier(0.34,1.56,0.64,1) forwards';
      document.getElementById('chatBar').style.animation='slideUp 0.6s ease 0.3s forwards';
      setTimeout(async ()=>{
        window.currentConvId = await window.startNewConversation();
        addMsg('HELLO! 👋', 'ai');
        setTimeout(()=>{ addMsg("What's your name? 😊", 'ai'); nameAsked = true; }, 1000);
      }, 800);
    },4300);
  }

  // Sidebar
  function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('show'); if(window.loadSidebarHistory) window.loadSidebarHistory(); }
  function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('show'); }

  // New Chat
  async function newChat() {
    document.getElementById('chatArea').innerHTML = '';
    conversationHistory = [];
    isStopped = false;
    nameAsked = false;
    userName = '';
    confirmState = '';
    window.currentConvId = await window.startNewConversation();
  }

  // Send text — Enter key
  document.getElementById('textInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      sendText();
    }
  });

  let isStopped = false;
  let nameAsked = false;
  let userName = '';
  let conversationHistory = [];

  function handleNameResponse(text) {
    const t = text.trim();
    const lower = t.toLowerCase();

    // Hifza check
    if (lower.includes('hifza')) {
      userName = 'Hifza';
      addMsg("Are you Hifza Azam? 😊", 'ai');
      nameAsked = false;
      return 'hifza_confirm';
    }
    // Khadija check
    if (lower.includes('khadija') || lower.includes('khadeeja')) {
      userName = 'Khadija';
      addMsg("Are you Khadija Rehan? 😊", 'ai');
      nameAsked = false;
      return 'khadija_confirm';
    }
    // Friends list
    const friends = ['awais','daud','dawood','saboor','fahad','ahmed','ahmad','umair'];
    const found = friends.find(f => lower.includes(f));
    if (found) {
      const name = t.charAt(0).toUpperCase() + t.slice(1);
      userName = name;
      addMsg(`${name}! You are one of my creator Wali Butt's great friends! 🤝 True friendship is a blessing, and Wali is very lucky to have a friend like you! Keep rocking together! 🔥`, 'ai');
      nameAsked = false;
      return 'done';
    }
    // Unknown name
    userName = t;
    addMsg(`Nice to meet you, ${t}! 😊 I am NEXA, your AI assistant. How are you doing?`, 'ai');
    nameAsked = false;
    return 'done';
  }

  let confirmState = '';
  function sendText() {
    const input = document.getElementById('textInput');
    const text = input.value.trim();
    if (!text || isProcessing) return;
    input.value = '';

    const stopWords = ['stop talking', 'bus baat khatam', 'no more talking', 'chup ho jao', 'band karo', 'chup'];
    if (stopWords.some(w => text.toLowerCase().includes(w))) {
      isStopped = true;
      addMsg(text, 'user');
      addMsg('Alright, I will stop talking now. 🤐', 'ai');
      return;
    }
    if (isStopped) {
      addMsg(text, 'user');
      return;
    }

    addMsg(text, 'user');

    const isYes = t => ['yes','ha','haan','han','g','ji','ji ha','ji haan','haan ji','ha ji','bilkul','zaroor','correct','sahi','right','yep','yeah','yup','ok','okay'].some(w => t.toLowerCase().includes(w));

    // Confirm Hifza Azam
    if (confirmState === 'hifza_confirm') {
      confirmState = '';
      if (isYes(text)) {
        addMsg("You are my creator Wali Butt's most lovely and wonderful friend! 💛 The world is more beautiful because of you. Wali is so lucky to have a friend like you! 🌸", 'ai');
      } else {
        getResponse(text);
      }
      return;
    }

    // Confirm Khadija Rehan
    if (confirmState === 'khadija_confirm') {
      confirmState = '';
      if (isYes(text)) {
        addMsg("You are my creator's beloved mother! 💐 You are truly wonderful, your love and prayers are Wali's greatest strength. May Allah always keep you happy and healthy! A mother like you is a rare blessing. 🤲", 'ai');
      } else {
        getResponse(text);
      }
      return;
    }

    // Name response
    if (nameAsked) {
      const result = handleNameResponse(text);
      if (result === 'hifza_confirm') confirmState = 'hifza_confirm';
      if (result === 'khadija_confirm') confirmState = 'khadija_confirm';
      return;
    }

    getResponse(text);
  }

  // Add message to chat
  function addMsg(text, type) {
    const chatArea = document.getElementById('chatArea');
    const row = document.createElement('div');
    row.className = `msg-row ${type}`;
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;
    row.appendChild(bubble);
    chatArea.appendChild(row);
    chatArea.scrollTop = chatArea.scrollHeight;
    return row;
  }

  // AI Response
  async function getResponse(text) {
    isProcessing = true;
    targetAmp = 30;
    document.getElementById('sphere').classList.add('processing');
    document.getElementById('sendBtn').classList.add('processing');
    document.getElementById('sendBtn').textContent = '⏳';

    // Typing indicator
    const chatArea = document.getElementById('chatArea');
    const typingRow = document.createElement('div');
    typingRow.className = 'msg-row ai';
    typingRow.id = 'typingIndicator';
    typingRow.innerHTML = '<div class="typing-bubble"><span></span><span></span><span></span></div>';
    chatArea.appendChild(typingRow);
    chatArea.scrollTop = chatArea.scrollHeight;

    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${GROQ_KEY}`
        },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          messages: [
            { role: 'system', content: SYSTEM_PROMPT },
            ...conversationHistory,
            { role: 'user', content: text }
          ]
        })
      });

      const result = await res.json();
      const aiText = result.choices[0].message.content;

      conversationHistory.push({ role: 'user', content: text });
      conversationHistory.push({ role: 'assistant', content: aiText });

      document.getElementById('typingIndicator')?.remove();

      console.error(e);

    isProcessing = false;
    targetAmp = 5;
    document.getElementById('sphere').classList.remove('processing');

    document.getElementById('sendBtn').textContent = '➤';

  async function generateImage() {
    const prompt = document.getElementById('imgPromptInput').value.trim();
    if (!prompt) { document.getElementById('imgPromptInput').focus(); return; }
    document.getElementById('imgGenBtn').disabled = true;
    document.getElementById('imgGenBtn').textContent = '⏳';

    document.getElementById('imgPromptInput').value = '';
    try {
      const res = await fetch('https://butts-ai-assistant.vercel.app/generate-image', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      });
      const data = await res.json();
      if (data.retry) { addMsg('⏳ Model load ho raha hai — 20 sec baad retry karo', 'ai'); return; }
      if (!data.image) throw new Error(data.error || 'Unknown error');
      const imgRow = document.createElement('div');
      imgRow.className = 'msg-row ai';
      imgRow.innerHTML = `<div class="msg-bubble" style="padding:6px;max-width:85%"><img src="${data.image}" style="width:100%;border-radius:8px;display:block"><div style="font-size:0.75rem;color:rgba(245,200,66,0.6);padding:6px 4px 2px">🎨 ${prompt}</div></div>`;

      document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;

      addMsg('Image error: ' + e.message, 'ai');

    document.getElementById('imgGenBtn').disabled = false;
    document.getElementById('imgGenBtn').textContent = '✨';
  }

  function analyzeImage(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
      const b64 = e.target.result;
      const imgRow = document.createElement('div');
      imgRow.className = 'msg-row user';
      imgRow.innerHTML = `<div class="msg-bubble" style="padding:6px"><img src="${b64}" style="width:160px;border-radius:8px;display:block"></div>`;
      document.getElementById('chatArea').appendChild(imgRow);
      document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
      await getResponse('Is image mein kya hai? Detail mein batao.');
    };
    reader.readAsDataURL(file);
  }
