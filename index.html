<!DOCTYPE html>
<html lang="ur">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NEXA AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #080800; font-family: 'Rajdhani', sans-serif; color: white; overflow: hidden; }

    .app { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 40px 20px 20px; }

    .top-bar { width: 100%; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
    .top-title h1 { font-family: 'Orbitron', monospace; font-size: 1.1rem; font-weight: 900; background: linear-gradient(90deg, #f5c842, #fff7c0, #f5c842); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: goldShine 3s linear infinite; letter-spacing: 4px; }
    @keyframes goldShine { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }

    #loginBtn { padding: 8px 16px; border-radius: 20px; border: 1px solid rgba(245,200,66,0.4); background: rgba(245,200,66,0.1); color: rgba(245,200,66,0.9); font-size: 0.75rem; cursor: pointer; font-family: 'Orbitron', monospace; letter-spacing: 1px; transition: all 0.3s; }
    #loginBtn:hover { background: rgba(245,200,66,0.2); box-shadow: 0 0 15px rgba(245,200,66,0.3); }

    .user-info { display: none; align-items: center; gap: 8px; }
    .user-info.show { display: flex; }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(245,200,66,0.4); object-fit: cover; }
    .user-name { font-size: 0.75rem; color: rgba(245,200,66,0.8); font-family: 'Orbitron', monospace; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #logoutBtn { padding: 4px 10px; border-radius: 10px; border: 1px solid rgba(239,68,68,0.3); background: rgba(239,68,68,0.1); color: rgba(239,68,68,0.7); font-size: 0.65rem; cursor: pointer; font-family: 'Orbitron', monospace; }

    /* Sphere */
    .sphere-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 30px; width: 100%; }
    .sphere-wrapper { position: relative; width: 260px; height: 260px; cursor: pointer; }
    .sphere { width: 260px; height: 260px; border-radius: 50%; position: relative; background: radial-gradient(circle at 35% 35%, rgba(255,220,100,0.15), rgba(180,140,0,0.4) 40%, rgba(60,40,0,0.9) 70%, rgba(10,8,0,1) 100%); box-shadow: 0 0 60px rgba(245,200,66,0.4), 0 0 120px rgba(200,160,0,0.2), inset 0 0 60px rgba(150,100,0,0.5); animation: sphereIdle 4s ease-in-out infinite; overflow: hidden; }
    @keyframes sphereIdle { 0%,100% { box-shadow: 0 0 60px rgba(245,200,66,0.4), 0 0 120px rgba(200,160,0,0.2), inset 0 0 60px rgba(150,100,0,0.5); } 50% { box-shadow: 0 0 80px rgba(255,220,80,0.6), 0 0 160px rgba(220,180,0,0.3), inset 0 0 80px rgba(180,130,0,0.6); } }
    .sphere.listening { animation: sphereListen 0.8s ease-in-out infinite; }
    @keyframes sphereListen { 0%,100% { box-shadow: 0 0 80px rgba(255,220,80,0.8), 0 0 160px rgba(245,200,66,0.4), inset 0 0 80px rgba(180,130,0,0.6); transform: scale(1); } 50% { box-shadow: 0 0 120px rgba(255,230,100,0.9), 0 0 200px rgba(245,200,66,0.5), inset 0 0 100px rgba(200,150,0,0.7); transform: scale(1.03); } }
    .sphere.thinking { animation: sphereThink 1.5s linear infinite; }
    @keyframes sphereThink { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(30deg); } }
    #sphereCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; opacity: 0.7; }
    .sphere-shine { position: absolute; top: 15%; left: 20%; width: 35%; height: 25%; background: radial-gradient(ellipse, rgba(255,255,200,0.2), transparent); border-radius: 50%; pointer-events: none; }
    .sphere-ring { position: absolute; top: -12px; left: -12px; right: -12px; bottom: -12px; border-radius: 50%; border: 1px solid rgba(245,200,66,0.3); animation: ringPulse 3s ease-in-out infinite; }
    .sphere-ring2 { position: absolute; top: -24px; left: -24px; right: -24px; bottom: -24px; border-radius: 50%; border: 1px solid rgba(245,200,66,0.15); animation: ringPulse 3s ease-in-out infinite 1s; }
    @keyframes ringPulse { 0%,100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.02); } }

    .status-section { text-align: center; min-height: 60px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    #transcript { font-size: 0.9rem; color: rgba(245,200,66,0.8); letter-spacing: 0.5px; min-height: 20px; font-style: italic; max-width: 280px; text-align: center; }
    #status { font-family: 'Orbitron', monospace; font-size: 1.1rem; font-weight: 700; color: white; letter-spacing: 2px; animation: statusGlow 2s ease-in-out infinite; }
    @keyframes statusGlow { 0%,100% { text-shadow: 0 0 10px rgba(245,200,66,0.5); } 50% { text-shadow: 0 0 20px rgba(255,220,80,0.8), 0 0 40px rgba(245,200,66,0.4); } }

    .mic-btn { width: 52px; height: 52px; border-radius: 50%; border: 2px solid rgba(245,200,66,0.6); background: rgba(180,140,0,0.2); color: white; font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; box-shadow: 0 0 20px rgba(245,200,66,0.3); }

    /* Chat Panel */
    .chat-panel { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(10,8,0,0.97); z-index: 100; display: none; flex-direction: column; }
    .chat-panel.open { display: flex; }
    .chat-header { padding: 16px 20px; border-bottom: 1px solid rgba(245,200,66,0.2); display: flex; align-items: center; gap: 12px; background: rgba(20,15,0,0.9); flex-shrink: 0; }
    .chat-header h2 { font-family: 'Orbitron', monospace; font-size: 0.85rem; color: rgba(245,200,66,0.9); letter-spacing: 2px; flex: 1; }
    .close-chat { background: none; border: 1px solid rgba(245,200,66,0.3); color: rgba(245,200,66,0.8); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-family: 'Orbitron', monospace; }

    #conversation { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch; }
    #conversation::-webkit-scrollbar { width: 3px; }
    #conversation::-webkit-scrollbar-thumb { background: rgba(245,200,66,0.3); border-radius: 2px; }

    .msg { padding: 10px 14px; font-size: 0.88rem; line-height: 1.6; max-width: 78%; animation: msgIn 0.3s ease; word-break: break-word; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .user-msg { background: rgba(180,140,0,0.12); border: 1px solid rgba(245,200,66,0.25); border-radius: 14px 2px 14px 14px; align-self: flex-end; }
    .ai-msg { background: rgba(100,80,0,0.12); border: 1px solid rgba(200,160,0,0.25); border-radius: 2px 14px 14px 14px; align-self: flex-start; }

    .typing { display: flex; gap: 5px; padding: 11px 14px; background: rgba(100,80,0,0.12); border: 1px solid rgba(200,160,0,0.25); border-radius: 2px 14px 14px 14px; align-self: flex-start; width: fit-content; }
    .typing span { width: 6px; height: 6px; background: rgba(245,200,66,0.8); border-radius: 50%; animation: typingDot 1.2s ease-in-out infinite; box-shadow: 0 0 6px rgba(245,200,66,0.8); }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingDot { 0%,60%,100% { transform: translateY(0); opacity: 0.3; } 30% { transform: translateY(-6px); opacity: 1; } }

    .chat-input-area { padding: 12px 16px; border-top: 1px solid rgba(245,200,66,0.15); background: rgba(15,12,0,0.95); flex-shrink: 0; display: flex; gap: 8px; align-items: center; }
    #textInput { flex: 1; padding: 11px 16px; background: rgba(120,90,0,0.15); border: 1px solid rgba(245,200,66,0.25); border-radius: 25px; color: white; font-size: 0.88rem; outline: none; font-family: 'Rajdhani', sans-serif; -webkit-appearance: none; }
    #textInput::placeholder { color: rgba(245,200,66,0.3); }
    #textInput:focus { border-color: rgba(245,200,66,0.6); box-shadow: 0 0 15px rgba(245,200,66,0.1); }
    #sendBtn { width: 42px; height: 42px; border-radius: 50%; border: 1px solid rgba(245,200,66,0.4); background: rgba(180,140,0,0.2); color: rgba(245,200,66,0.9); font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
    #sendBtn:hover { background: rgba(245,200,66,0.25); box-shadow: 0 0 15px rgba(245,200,66,0.3); }

    /* History Panel */
    .history-panel { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(10,8,0,0.97); z-index: 100; display: none; flex-direction: column; }
    .history-panel.open { display: flex; }
    .history-header { padding: 16px 20px; border-bottom: 1px solid rgba(245,200,66,0.2); display: flex; align-items: center; gap: 12px; background: rgba(20,15,0,0.9); flex-shrink: 0; }
    .history-header h2 { font-family: 'Orbitron', monospace; font-size: 0.85rem; color: rgba(245,200,66,0.9); letter-spacing: 2px; flex: 1; }
    #historyList { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
    .history-item { padding: 12px 16px; background: rgba(120,90,0,0.12); border: 1px solid rgba(245,200,66,0.15); border-radius: 8px; cursor: pointer; transition: all 0.2s; }
    .history-item:hover { background: rgba(180,140,0,0.2); border-color: rgba(245,200,66,0.3); }
    .history-date { font-size: 0.65rem; color: rgba(245,200,66,0.5); font-family: 'Orbitron', monospace; letter-spacing: 1px; margin-bottom: 4px; }
    .history-preview { font-size: 0.82rem; color: rgba(255,255,255,0.6); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .no-history { text-align: center; color: rgba(255,255,255,0.3); font-family: 'Orbitron', monospace; font-size: 0.75rem; letter-spacing: 1px; margin-top: 40px; }
    .login-required { text-align: center; padding: 40px 20px; }
    .login-required p { color: rgba(255,255,255,0.4); font-size: 0.85rem; margin-bottom: 16px; }
    .login-required button { padding: 10px 24px; border-radius: 20px; border: 1px solid rgba(245,200,66,0.4); background: rgba(180,140,0,0.2); color: rgba(245,200,66,0.9); font-size: 0.8rem; cursor: pointer; font-family: 'Orbitron', monospace; }

    /* Bottom Nav */
    .bottom-nav { width: 100%; max-width: 340px; background: rgba(255,255,255,0.04); backdrop-filter: blur(20px); border: 1px solid rgba(245,200,66,0.15); border-radius: 50px; padding: 10px 20px; display: flex; justify-content: space-around; align-items: center; gap: 8px; }
    .nav-btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: transparent; color: rgba(255,255,255,0.3); font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
    .nav-btn.active { color: rgba(245,200,66,0.9); background: rgba(245,200,66,0.12); box-shadow: 0 0 15px rgba(245,200,66,0.2); }

    /* Response Popup */
    .response-popup { position: fixed; bottom: 160px; left: 50%; transform: translateX(-50%); max-width: 85%; background: rgba(15,12,0,0.95); border: 1px solid rgba(245,200,66,0.3); border-radius: 16px; padding: 14px 18px; font-size: 0.88rem; line-height: 1.6; color: rgba(255,255,255,0.9); z-index: 50; display: none; backdrop-filter: blur(10px); box-shadow: 0 0 30px rgba(200,160,0,0.2); }
    .response-popup.show { display: block; animation: popupIn 0.3s ease; }
    @keyframes popupIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

    /* Corner decorations */
    .corner { position: fixed; width: 40px; height: 40px; z-index: 2; pointer-events: none; }
    .corner::before, .corner::after { content: ''; position: absolute; background: rgba(245,200,66,0.6); box-shadow: 0 0 8px rgba(245,200,66,0.8); }
    .corner::before { width: 100%; height: 1px; top: 0; left: 0; }
    .corner::after { width: 1px; height: 100%; top: 0; left: 0; }
    .corner-tl { top: 10px; left: 10px; }
    .corner-tr { top: 10px; right: 10px; transform: scaleX(-1); }
    .corner-bl { bottom: 10px; left: 10px; transform: scaleY(-1); }
    .corner-br { bottom: 10px; right: 10px; transform: scale(-1); }

    #bgCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
  </style>
</head>
<body>

  <canvas id="bgCanvas"></canvas>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="app">
    <div class="top-bar">
      <div class="top-title"><h1>NEXA</h1></div>
      <button id="loginBtn" onclick="loginWithGoogle()">🔑 LOGIN</button>
      <div class="user-info" id="userInfo">
        <img class="user-avatar" id="userAvatar" src="" alt="">
        <span class="user-name" id="userName"></span>
        <button id="logoutBtn" onclick="logout()">OUT</button>
      </div>
    </div>

    <div class="sphere-section">
      <div class="sphere-wrapper" onclick="toggleVoice()">
        <div class="sphere-ring2"></div>
        <div class="sphere-ring"></div>
        <div class="sphere" id="sphere">
          <canvas id="sphereCanvas"></canvas>
          <div class="sphere-shine"></div>
        </div>
      </div>
      <div class="status-section">
        <div id="transcript"></div>
        <div id="status">Tap to speak</div>
        <button class="mic-btn" onclick="toggleVoice()" id="micBtn">🎤</button>
      </div>
    </div>

    <div class="bottom-nav">
      <button class="nav-btn active" onclick="showHome()">🏠</button>
      <button class="nav-btn" onclick="showChat()">💬</button>
      <button class="nav-btn" onclick="showHistory()">📋</button>
      <button class="nav-btn">⚙️</button>
    </div>
  </div>

  <div class="response-popup" id="responsePopup"></div>

  <!-- Chat Panel -->
  <div class="chat-panel" id="chatPanel">
    <div class="chat-header">
      <h2>💬 NEXA CHAT</h2>
      <button class="close-chat" onclick="hideChat()">✕ CLOSE</button>
    </div>
    <div id="conversation">
      <div class="msg ai-msg">✨ Assalam o Alaikum! Main NEXA hoon — aapka AI assistant. Voice ya text — dono se baat kar sakte hain!</div>
    </div>
    <div class="chat-input-area">
      <input type="text" id="textInput" placeholder="NEXA se poochhein..." onkeydown="if(event.key==='Enter') sendText()" />
      <button id="sendBtn" onclick="sendText()">➤</button>
    </div>
  </div>

  <!-- History Panel -->
  <div class="history-panel" id="historyPanel">
    <div class="history-header">
      <h2>📋 NEXA HISTORY</h2>
      <button class="close-chat" onclick="hideHistory()">✕ CLOSE</button>
    </div>
    <div id="historyList"></div>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
    import { getFirestore, collection, addDoc, query, where, orderBy, getDocs, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyCLosHSZulEZW1ustqAXk8XfpLNWkjKyhw",
      authDomain: "butts-ai-assistant.firebaseapp.com",
      projectId: "butts-ai-assistant",
      storageBucket: "butts-ai-assistant.firebasestorage.app",
      messagingSenderId: "212491212408",
      appId: "1:212491212408:web:7bf79f2d3321674a6d7f8d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      if (user) {
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('userInfo').classList.add('show');
        document.getElementById('userAvatar').src = user.photoURL || '';
        document.getElementById('userName').textContent = user.displayName?.split(' ')[0] || 'User';
      } else {
        document.getElementById('loginBtn').style.display = 'block';
        document.getElementById('userInfo').classList.remove('show');
      }
    });

    window.loginWithGoogle = async () => {
      try { await signInWithPopup(auth, provider); } catch(e) { console.error(e); }
    };

    window.logout = async () => { await signOut(auth); };

    window.saveMessage = async (userText, aiText) => {
      if (!currentUser) return;
      try {
        await addDoc(collection(db, 'chats'), {
          userId: currentUser.uid,
          userText, aiText,
          timestamp: serverTimestamp()
        });
      } catch(e) { console.error(e); }
    };

    window.loadHistory = async () => {
      const historyList = document.getElementById('historyList');
      if (!currentUser) {
        historyList.innerHTML = `<div class="login-required"><p>History dekhne ke liye login karein</p><button onclick="loginWithGoogle()">🔑 Google se Login</button></div>`;
        return;
      }
      try {
        historyList.innerHTML = '<div class="no-history">Loading...</div>';
        const q = query(collection(db, 'chats'), where('userId', '==', currentUser.uid), orderBy('timestamp', 'desc'));
        const snap = await getDocs(q);
        if (snap.empty) { historyList.innerHTML = '<div class="no-history">Koi history nahi mili</div>'; return; }
        historyList.innerHTML = '';
        snap.forEach(doc => {
          const d = doc.data();
          const date = d.timestamp?.toDate();
          const dateStr = date ? date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';
          const div = document.createElement('div');
          div.className = 'history-item';
          div.innerHTML = `<div class="history-date">${dateStr}</div><div class="history-preview">▶ ${d.userText}</div><div class="history-preview" style="color:rgba(245,200,66,0.6)">✨ ${d.aiText}</div>`;
          historyList.appendChild(div);
        });
      } catch(e) { historyList.innerHTML = '<div class="no-history">Error loading</div>'; }
    };
  </script>

  <script>
    // Background
    const bgCanvas = document.getElementById('bgCanvas');
    const bgCtx = bgCanvas.getContext('2d');
    function resizeBg() { bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight; }
    resizeBg();
    window.addEventListener('resize', resizeBg);

    const stars = Array.from({length: 150}, () => ({ x: Math.random()*bgCanvas.width, y: Math.random()*bgCanvas.height, size: Math.random()*1.5+0.3, opacity: Math.random()*0.6+0.1, twinkle: Math.random()*Math.PI*2 }));
    const bgParticles = Array.from({length: 25}, () => ({ x: Math.random()*bgCanvas.width, y: Math.random()*bgCanvas.height, vx:(Math.random()-0.5)*0.3, vy:(Math.random()-0.5)*0.3, size:Math.random()*2+0.5, color:Math.random()>0.5?'245,200,66':'200,160,0' }));

    function animateBg() {
      bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
      stars.forEach(s => {
        s.twinkle+=0.015;
        const op = s.opacity*(0.7+0.3*Math.sin(s.twinkle));
        bgCtx.beginPath(); bgCtx.arc(s.x,s.y,s.size,0,Math.PI*2);
        bgCtx.fillStyle=`rgba(255,240,180,${op})`; bgCtx.fill();
      });
      bgParticles.forEach(p => {
        bgCtx.beginPath(); bgCtx.arc(p.x,p.y,p.size,0,Math.PI*2);
        bgCtx.fillStyle=`rgba(${p.color},0.25)`; bgCtx.shadowBlur=8; bgCtx.shadowColor=`rgba(${p.color},0.8)`; bgCtx.fill(); bgCtx.shadowBlur=0;
        p.x+=p.vx; p.y+=p.vy;
        if(p.x<0||p.x>bgCanvas.width) p.vx*=-1;
        if(p.y<0||p.y>bgCanvas.height) p.vy*=-1;
      });
      requestAnimationFrame(animateBg);
    }
    animateBg();

    // Sphere
    const sc = document.getElementById('sphereCanvas');
    const sCtx = sc.getContext('2d');
    sc.width=260; sc.height=260;
    let waveAmplitude=8, targetAmplitude=8, waveFrame=0;

    function animateSphere() {
      sCtx.clearRect(0,0,260,260);
      waveFrame+=0.05;
      waveAmplitude+=(targetAmplitude-waveAmplitude)*0.1;
      const waves = [
        {color:'rgba(255,200,50,0.5)', offset:0, freq:2},
        {color:'rgba(200,150,0,0.4)', offset:Math.PI/3, freq:3},
        {color:'rgba(255,220,80,0.3)', offset:Math.PI/1.5, freq:1.5},
      ];
      waves.forEach(w => {
        sCtx.beginPath();
        for(let x=0;x<=260;x+=2) {
          const y=130+Math.sin(x*0.04*w.freq+waveFrame+w.offset)*waveAmplitude+Math.sin(x*0.02+waveFrame*0.7+w.offset)*(waveAmplitude*0.5);
          if(x===0) sCtx.moveTo(x,y); else sCtx.lineTo(x,y);
        }
        sCtx.strokeStyle=w.color; sCtx.lineWidth=2; sCtx.shadowBlur=10; sCtx.shadowColor=w.color; sCtx.stroke(); sCtx.shadowBlur=0;
      });
      requestAnimationFrame(animateSphere);
    }
    animateSphere();

    // Navigation
    function showHome() { hideChat(); hideHistory(); document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===0)); }
    function showChat() { hideHistory(); document.getElementById('chatPanel').style.display='flex'; document.getElementById('chatPanel').classList.add('open'); document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===1)); }
    function hideChat() { document.getElementById('chatPanel').classList.remove('open'); document.getElementById('chatPanel').style.display='none'; }
    function showHistory() { hideChat(); document.getElementById('historyPanel').style.display='flex'; document.getElementById('historyPanel').classList.add('open'); document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===2)); if(window.loadHistory) window.loadHistory(); }
    function hideHistory() { document.getElementById('historyPanel').classList.remove('open'); document.getElementById('historyPanel').style.display='none'; }

    // Voice
    let recognition, isListening=false;
    function toggleVoice() { if(isListening) stopVoice(); else startVoice(); }
    function startVoice() {
      if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)) { setStatus('Chrome use karo!'); return; }
      const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
      recognition=new SR(); recognition.lang='ur-PK'; recognition.continuous=false; recognition.interimResults=true; recognition.start();
      isListening=true; targetAmplitude=35;
      document.getElementById('sphere').classList.add('listening');
      document.getElementById('micBtn').textContent='⏹';
      setStatus('Listening...'); setTranscript('');
      recognition.onresult=async(e)=>{
        const interim=Array.from(e.results).map(r=>r[0].transcript).join('');
        setTranscript(interim);
        if(e.results[e.results.length-1].isFinal) {
          const text=e.results[e.results.length-1][0].transcript;
          stopVoice(); addMsg(text,'user-msg'); await getResponse(text,true);
        }
      };
      recognition.onerror=()=>{ stopVoice(); setStatus('Tap to speak'); };
      recognition.onend=()=>{ if(isListening) stopVoice(); };
    }
    function stopVoice() {
      if(recognition) recognition.stop();
      isListening=false; targetAmplitude=8;
      document.getElementById('sphere').classList.remove('listening');
      document.getElementById('sphere').classList.remove('thinking');
      document.getElementById('micBtn').textContent='🎤';
    }

    function sendText() {
      const input=document.getElementById('textInput');
      const text=input.value.trim(); if(!text) return;
      input.value=''; addMsg(text,'user-msg'); getResponse(text,false);
    }

    async function getResponse(text, speakOut) {
      document.getElementById('sphere').classList.add('thinking');
      targetAmplitude=20; setStatus('Processing...'); setTranscript('');
      const typing=document.createElement('div');
      typing.className='typing'; typing.id='typing';
      typing.innerHTML='<span></span><span></span><span></span>';
      document.getElementById('conversation').appendChild(typing);
      scrollDown();
      try {
        const res=await fetch('https://butts-ai-assistant.vercel.app/ai-response', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body:JSON.stringify({userText:text})
        });
        const data=await res.json();
        document.getElementById('typing')?.remove();
        document.getElementById('sphere').classList.remove('thinking');
        addMsg(data.response,'ai-msg');
        showPopup(data.response);
        if(window.saveMessage) window.saveMessage(text, data.response);
        if(speakOut) { speakText(data.response); setStatus('Speaking...'); targetAmplitude=25; }
        else { setStatus('Tap to speak'); targetAmplitude=8; }
      } catch {
        document.getElementById('typing')?.remove();
        document.getElementById('sphere').classList.remove('thinking');
        setStatus('Error — retry karo'); targetAmplitude=8;
      }
    }

    let popupTimer;
    function showPopup(text) {
      const popup=document.getElementById('responsePopup');
      popup.textContent='✨ '+text;
      popup.classList.add('show');
      clearTimeout(popupTimer);
      popupTimer=setTimeout(()=>popup.classList.remove('show'),6000);
    }

    function speakText(text) {
      window.speechSynthesis.cancel();
      const utt=new SpeechSynthesisUtterance(text);
      utt.lang=/[\u0600-\u06FF]/.test(text)?'ur-PK':'en-US';
      utt.rate=0.88; utt.pitch=1; utt.volume=1;
      utt.onend=()=>{ setStatus('Tap to speak'); targetAmplitude=8; };
      setTimeout(()=>window.speechSynthesis.speak(utt),200);
    }

    function addMsg(text,cls) {
      const div=document.createElement('div');
      div.className='msg '+cls;
      div.textContent=(cls==='user-msg'?'▶ ':'✨ ')+text;
      document.getElementById('conversation').appendChild(div);
      scrollDown();
    }
    function scrollDown() { const c=document.getElementById('conversation'); c.scrollTop=c.scrollHeight; }
    function setStatus(msg) { document.getElementById('status').textContent=msg; }
    function setTranscript(msg) { document.getElementById('transcript').textContent=msg; }

    if(window.visualViewport) {
      window.visualViewport.addEventListener('resize',()=>{
        document.querySelector('.app').style.height=window.visualViewport.height+'px';
      });
    }
  </script>
</body>
</html>
