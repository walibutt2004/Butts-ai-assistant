<!DOCTYPE html>
<html lang="ur">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Butt's AI Assistance</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #000008;
      font-family: 'Rajdhani', sans-serif;
      color: white;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── CANVAS BACKGROUND ── */
    #bgCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    /* ── SCANLINES ── */
    .scanlines {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.08) 2px,
        rgba(0, 0, 0, 0.08) 4px
      );
      z-index: 1;
      pointer-events: none;
      animation: scanMove 8s linear infinite;
    }
    @keyframes scanMove {
      0% { background-position: 0 0; }
      100% { background-position: 0 100px; }
    }

    /* ── CORNER DECORATIONS ── */
    .corner {
      position: fixed;
      width: 60px; height: 60px;
      z-index: 2;
      pointer-events: none;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: #7c3aed;
      box-shadow: 0 0 10px #7c3aed, 0 0 20px #7c3aed;
    }
    .corner::before { width: 100%; height: 2px; top: 0; left: 0; }
    .corner::after { width: 2px; height: 100%; top: 0; left: 0; }
    .corner-tl { top: 12px; left: 12px; }
    .corner-tr { top: 12px; right: 12px; transform: scaleX(-1); }
    .corner-bl { bottom: 12px; left: 12px; transform: scaleY(-1); }
    .corner-br { bottom: 12px; right: 12px; transform: scale(-1); }

    /* ── MAIN CONTAINER ── */
    .container {
      position: relative;
      z-index: 3;
      width: 92%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      height: 96vh;
      justify-content: center;
    }

    /* ── CYBERPUNK CARD ── */
    .cyber-card {
      background: rgba(5, 0, 30, 0.85);
      border: 1px solid rgba(124, 58, 237, 0.4);
      border-radius: 4px;
      position: relative;
      overflow: hidden;
    }
    .cyber-card::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, #7c3aed, #3b82f6, transparent);
      animation: scanLine 3s linear infinite;
    }
    @keyframes scanLine {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    /* ── HEADER ── */
    .header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid rgba(124, 58, 237, 0.25);
      position: relative;
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
    }
    .ai-avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: 2px solid #7c3aed;
      background: radial-gradient(circle, rgba(124,58,237,0.4), rgba(59,130,246,0.2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      box-shadow: 0 0 15px rgba(124,58,237,0.6), 0 0 30px rgba(124,58,237,0.2);
      animation: avatarPulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes avatarPulse {
      0%, 100% { box-shadow: 0 0 15px rgba(124,58,237,0.6), 0 0 30px rgba(124,58,237,0.2); }
      50% { box-shadow: 0 0 25px rgba(124,58,237,0.9), 0 0 50px rgba(124,58,237,0.4), 0 0 70px rgba(59,130,246,0.2); }
    }
    .header-text h1 {
      font-family: 'Orbitron', monospace;
      font-size: 1.05rem;
      font-weight: 900;
      background: linear-gradient(90deg, #a78bfa, #60a5fa, #a78bfa);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: textShine 3s linear infinite;
      letter-spacing: 1px;
    }
    @keyframes textShine {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }
    .header-text p {
      font-size: 0.7rem;
      color: rgba(124,58,237,0.7);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* Online indicator */
    .online-badge {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.7rem;
      color: #34d399;
      letter-spacing: 1px;
    }
    .online-dot {
      width: 6px; height: 6px;
      background: #34d399;
      border-radius: 50%;
      box-shadow: 0 0 8px #34d399;
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 16px;
      margin-top: 8px;
    }
    .stat {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .stat span {
      color: #7c3aed;
      font-weight: 600;
    }

    /* ── CHAT AREA ── */
    #conversation {
      padding: 14px;
      height: 280px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: rgba(124,58,237,0.3) transparent;
    }
    #conversation::-webkit-scrollbar { width: 3px; }
    #conversation::-webkit-scrollbar-thumb {
      background: rgba(124,58,237,0.4);
      border-radius: 2px;
    }

    .msg {
      padding: 10px 14px;
      font-size: 0.88rem;
      line-height: 1.55;
      max-width: 82%;
      position: relative;
      animation: msgIn 0.3s ease;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 400;
      letter-spacing: 0.3px;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .user-msg {
      background: rgba(59, 130, 246, 0.08);
      border: 1px solid rgba(59, 130, 246, 0.3);
      border-radius: 2px 14px 14px 14px;
      align-self: flex-end;
      color: rgba(255,255,255,0.9);
      animation-name: msgInRight;
      box-shadow: 0 0 15px rgba(59,130,246,0.1), inset 0 0 15px rgba(59,130,246,0.05);
    }
    @keyframes msgInRight {
      from { opacity: 0; transform: translateX(10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .ai-msg {
      background: rgba(124, 58, 237, 0.08);
      border: 1px solid rgba(124, 58, 237, 0.3);
      border-radius: 14px 2px 14px 14px;
      align-self: flex-start;
      color: rgba(255,255,255,0.9);
      box-shadow: 0 0 15px rgba(124,58,237,0.1), inset 0 0 15px rgba(124,58,237,0.05);
    }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 5px;
      padding: 12px 16px;
      background: rgba(124,58,237,0.08);
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 14px 2px 14px 14px;
      align-self: flex-start;
      width: fit-content;
    }
    .typing span {
      width: 6px; height: 6px;
      background: #7c3aed;
      border-radius: 50%;
      box-shadow: 0 0 6px #7c3aed;
      animation: typingDot 1.2s ease-in-out infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingDot {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── CONTROLS ── */
    .controls {
      padding: 14px 16px;
      border-top: 1px solid rgba(124,58,237,0.2);
    }

    #status {
      text-align: center;
      font-size: 0.75rem;
      color: rgba(124,58,237,0.7);
      margin-bottom: 12px;
      min-height: 16px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-family: 'Orbitron', monospace;
    }

    /* Wave */
    .wave {
      display: none;
      justify-content: center;
      align-items: center;
      gap: 3px;
      height: 22px;
      margin-bottom: 10px;
    }
    .wave.active { display: flex; }
    .wave-bar {
      width: 3px;
      border-radius: 2px;
      animation: waveAnim 0.8s ease-in-out infinite;
    }
    .wave-bar:nth-child(1) { height: 6px; background: #7c3aed; box-shadow: 0 0 6px #7c3aed; animation-delay: 0s; }
    .wave-bar:nth-child(2) { height: 14px; background: #8b5cf6; box-shadow: 0 0 6px #8b5cf6; animation-delay: 0.1s; }
    .wave-bar:nth-child(3) { height: 22px; background: #60a5fa; box-shadow: 0 0 8px #60a5fa; animation-delay: 0.2s; }
    .wave-bar:nth-child(4) { height: 14px; background: #8b5cf6; box-shadow: 0 0 6px #8b5cf6; animation-delay: 0.3s; }
    .wave-bar:nth-child(5) { height: 6px; background: #7c3aed; box-shadow: 0 0 6px #7c3aed; animation-delay: 0.4s; }
    @keyframes waveAnim {
      0%, 100% { transform: scaleY(0.3); }
      50% { transform: scaleY(1); }
    }

    /* Voice button */
    .voice-row {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
    }
    #voiceBtn {
      width: 68px; height: 68px;
      border-radius: 50%;
      border: 2px solid rgba(124,58,237,0.6);
      background: rgba(124,58,237,0.1);
      color: white;
      font-size: 1.6rem;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(124,58,237,0.3), inset 0 0 20px rgba(124,58,237,0.05);
      animation: btnIdle 3s ease-in-out infinite;
    }
    @keyframes btnIdle {
      0%, 100% { box-shadow: 0 0 20px rgba(124,58,237,0.3), inset 0 0 20px rgba(124,58,237,0.05); }
      50% { box-shadow: 0 0 35px rgba(124,58,237,0.5), 0 0 60px rgba(59,130,246,0.15), inset 0 0 20px rgba(124,58,237,0.1); }
    }
    #voiceBtn:hover {
      transform: scale(1.1);
      background: rgba(124,58,237,0.2);
      box-shadow: 0 0 40px rgba(124,58,237,0.7), 0 0 80px rgba(59,130,246,0.3);
    }
    #voiceBtn.listening {
      border-color: rgba(239,68,68,0.8);
      background: rgba(239,68,68,0.12);
      animation: pulseRed 1s ease-out infinite;
    }
    @keyframes pulseRed {
      0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.6), 0 0 20px rgba(239,68,68,0.3); }
      70% { box-shadow: 0 0 0 20px rgba(239,68,68,0), 0 0 20px rgba(239,68,68,0.3); }
      100% { box-shadow: 0 0 0 0 rgba(239,68,68,0), 0 0 20px rgba(239,68,68,0.3); }
    }
    #voiceBtn.thinking {
      border-color: rgba(96,165,250,0.8);
      background: rgba(96,165,250,0.12);
      animation: spinGlow 1.5s linear infinite;
    }
    @keyframes spinGlow {
      0% { box-shadow: 0 0 20px rgba(96,165,250,0.4), 0 0 0 0 rgba(96,165,250,0.2); transform: rotate(0deg); }
      100% { box-shadow: 0 0 20px rgba(96,165,250,0.4), 0 0 0 0 rgba(96,165,250,0.2); transform: rotate(360deg); }
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(124,58,237,0.3), transparent);
    }
    .divider-text {
      font-size: 0.65rem;
      color: rgba(124,58,237,0.5);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: 'Orbitron', monospace;
    }

    /* Text input */
    .text-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #textInput {
      flex: 1;
      padding: 10px 16px;
      background: rgba(124,58,237,0.05);
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 2px;
      color: white;
      font-size: 0.88rem;
      outline: none;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 0.5px;
      transition: all 0.3s;
    }
    #textInput::placeholder { color: rgba(124,58,237,0.4); }
    #textInput:focus {
      border-color: rgba(124,58,237,0.8);
      background: rgba(124,58,237,0.08);
      box-shadow: 0 0 20px rgba(124,58,237,0.2);
    }
    #sendBtn {
      width: 40px; height: 40px;
      border-radius: 2px;
      border: 1px solid rgba(124,58,237,0.5);
      background: rgba(124,58,237,0.15);
      color: #a78bfa;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #sendBtn:hover {
      background: rgba(124,58,237,0.35);
      box-shadow: 0 0 20px rgba(124,58,237,0.5);
      color: white;
    }
  </style>
</head>
<body>

  <!-- Animated background -->
  <canvas id="bgCanvas"></canvas>
  <div class="scanlines"></div>

  <!-- Corner decorations -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="container">
    <div class="cyber-card">

      <!-- Header -->
      <div class="header">
        <div class="header-top">
          <div class="ai-avatar">🤖</div>
          <div class="header-text">
            <h1>BUTT'S AI ASSISTANCE</h1>
            <p>Neural Network v3.3 • Active</p>
          </div>
          <div class="online-badge">
            <div class="online-dot"></div>
            ONLINE
          </div>
        </div>
        <div class="stats-bar">
          <div class="stat">MODEL: <span>LLaMA 3.3</span></div>
          <div class="stat">LANG: <span>UR / EN</span></div>
          <div class="stat">MODE: <span>VOICE + TEXT</span></div>
        </div>
      </div>

      <!-- Chat -->
      <div id="conversation">
        <div class="msg ai-msg">⚡ SYSTEM ONLINE — Assalam o Alaikum! Main Butt's AI Assistance hoon. Voice ya text — dono se baat kar sakte hain!</div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <div id="status">STANDBY — MIC YA TEXT ACTIVATE KARO</div>

        <div class="wave" id="wave">
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
        </div>

        <div class="voice-row">
          <button id="voiceBtn" onclick="toggleVoice()" title="Voice activate">🎤</button>
        </div>

        <div class="divider">
          <div class="divider-line"></div>
          <div class="divider-text">or type</div>
          <div class="divider-line"></div>
        </div>

        <div class="text-row">
          <input type="text" id="textInput" placeholder="Query input karein..." onkeydown="if(event.key==='Enter') sendText()" />
          <button id="sendBtn" onclick="sendText()">➤</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    // ── ANIMATED BACKGROUND ──────────────────────────────
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    // Particles
    const particles = Array.from({length: 80}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
      size: Math.random() * 2 + 0.5,
      opacity: Math.random() * 0.6 + 0.1,
      color: Math.random() > 0.5 ? '124,58,237' : '59,130,246'
    }));

    // Grid lines
    function drawGrid() {
      ctx.strokeStyle = 'rgba(124,58,237,0.04)';
      ctx.lineWidth = 1;
      const spacing = 50;
      for (let x = 0; x < canvas.width; x += spacing) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
      }
      for (let y = 0; y < canvas.height; y += spacing) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
      }
    }

    // Floating lines
    const floatLines = Array.from({length: 6}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      length: Math.random() * 150 + 50,
      speed: Math.random() * 1 + 0.3,
      opacity: Math.random() * 0.3 + 0.05,
      horizontal: Math.random() > 0.5
    }));

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawGrid();

      // Draw floating lines
      floatLines.forEach(line => {
        ctx.beginPath();
        ctx.strokeStyle = `rgba(124,58,237,${line.opacity})`;
        ctx.lineWidth = 1;
        if (line.horizontal) {
          ctx.moveTo(line.x, line.y);
          ctx.lineTo(line.x + line.length, line.y);
          line.x += line.speed;
          if (line.x > canvas.width + line.length) line.x = -line.length;
        } else {
          ctx.moveTo(line.x, line.y);
          ctx.lineTo(line.x, line.y + line.length);
          line.y += line.speed;
          if (line.y > canvas.height + line.length) line.y = -line.length;
        }
        ctx.stroke();
      });

      // Draw particles
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${p.color},${p.opacity})`;
        ctx.shadowBlur = 6;
        ctx.shadowColor = `rgba(${p.color},0.8)`;
        ctx.fill();
        ctx.shadowBlur = 0;
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
      });

      // Connect nearby particles
      particles.forEach((p, i) => {
        particles.slice(i + 1).forEach(p2 => {
          const dist = Math.hypot(p.x - p2.x, p.y - p2.y);
          if (dist < 100) {
            ctx.beginPath();
            ctx.strokeStyle = `rgba(124,58,237,${0.15 * (1 - dist/100)})`;
            ctx.lineWidth = 0.5;
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
          }
        });
      });

      requestAnimationFrame(animate);
    }
    animate();

    // ── VOICE ────────────────────────────────────────────
    let recognition, isListening = false;

    function toggleVoice() {
      if (isListening) stopVoice(); else startVoice();
    }

    function startVoice() {
      if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
        setStatus('ERROR: CHROME REQUIRED'); return;
      }
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SR();
      recognition.lang = 'ur-PK';
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.start();
      isListening = true;
      document.getElementById('voiceBtn').textContent = '⏹';
      document.getElementById('voiceBtn').classList.add('listening');
      document.getElementById('wave').classList.add('active');
      setStatus('AUDIO INPUT ACTIVE — SPEAK NOW');

      recognition.onresult = async (e) => {
        const text = e.results[0][0].transcript;
        stopVoice();
        addMsg(text, 'user-msg');
        await getResponse(text, true);
      };
      recognition.onerror = () => { stopVoice(); setStatus('ERROR — RETRY'); };
      recognition.onend = () => { if (isListening) stopVoice(); };
    }

    function stopVoice() {
      if (recognition) recognition.stop();
      isListening = false;
      document.getElementById('voiceBtn').textContent = '🎤';
      document.getElementById('voiceBtn').classList.remove('listening');
      document.getElementById('wave').classList.remove('active');
    }

    // ── TEXT ─────────────────────────────────────────────
    function sendText() {
      const input = document.getElementById('textInput');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      addMsg(text, 'user-msg');
      getResponse(text, false);
    }

    // ── AI RESPONSE ──────────────────────────────────────
    async function getResponse(text, speakOut) {
      document.getElementById('voiceBtn').classList.add('thinking');
      document.getElementById('voiceBtn').textContent = '⚡';
      setStatus('PROCESSING NEURAL RESPONSE...');

      const typing = document.createElement('div');
      typing.className = 'typing'; typing.id = 'typing';
      typing.innerHTML = '<span></span><span></span><span></span>';
      document.getElementById('conversation').appendChild(typing);
      scrollDown();

      try {
        const res = await fetch('/ai-response', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userText: text })
        });
        const data = await res.json();
        document.getElementById('typing')?.remove();
        document.getElementById('voiceBtn').classList.remove('thinking');
        document.getElementById('voiceBtn').textContent = '🎤';
        addMsg(data.response, 'ai-msg');
        if (speakOut) { speakText(data.response); setStatus('AUDIO OUTPUT ACTIVE...'); }
        else setStatus('STANDBY — MIC YA TEXT ACTIVATE KARO');
      } catch {
        document.getElementById('typing')?.remove();
        document.getElementById('voiceBtn').classList.remove('thinking');
        document.getElementById('voiceBtn').textContent = '🎤';
        setStatus('CONNECTION ERROR — SERVER CHECK KARO');
      }
    }

    // ── SPEAK ────────────────────────────────────────────
    function speakText(text) {
      window.speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(text);
      utt.lang = /[\u0600-\u06FF]/.test(text) ? 'ur-PK' : 'en-US';
      utt.rate = 0.88; utt.pitch = 1; utt.volume = 1;
      utt.onend = () => setStatus('STANDBY — MIC YA TEXT ACTIVATE KARO');
      setTimeout(() => window.speechSynthesis.speak(utt), 200);
    }

    // ── HELPERS ──────────────────────────────────────────
    function addMsg(text, cls) {
      const div = document.createElement('div');
      div.className = 'msg ' + cls;
      div.textContent = (cls === 'user-msg' ? '▶ ' : '⚡ ') + text;
      document.getElementById('conversation').appendChild(div);
      scrollDown();
    }
    function scrollDown() {
      const c = document.getElementById('conversation');
      c.scrollTop = c.scrollHeight;
    }
    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }
  </script>
</body>
</html>
