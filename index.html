<!DOCTYPE html>
<html lang="ur">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Butt's Voice Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #000000;
      background-image: 
        radial-gradient(ellipse at 20% 50%, rgba(120, 40, 200, 0.4) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(0, 100, 255, 0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(0, 200, 180, 0.2) 0%, transparent 50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      overflow: hidden;
    }

    /* Floating background orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      animation: float 8s ease-in-out infinite;
      z-index: 0;
    }
    .orb1 { width: 400px; height: 400px; background: rgba(120, 40, 200, 0.6); top: -100px; left: -100px; animation-delay: 0s; }
    .orb2 { width: 300px; height: 300px; background: rgba(0, 100, 255, 0.5); bottom: -50px; right: -50px; animation-delay: 3s; }
    .orb3 { width: 200px; height: 200px; background: rgba(0, 200, 180, 0.4); top: 50%; left: 50%; animation-delay: 5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      width: 90%;
      max-width: 480px;
    }

    /* Glass card */
    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 28px;
      padding: 32px;
      width: 100%;
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.2),
        inset 0 -1px 0 rgba(255, 255, 255, 0.05);
    }

    /* Header */
    .header { text-align: center; margin-bottom: 8px; }
    .header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ffffff, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    .header p {
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
      margin-top: 4px;
    }

    /* Status */
    #status {
      text-align: center;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.7);
      min-height: 24px;
      letter-spacing: 0.3px;
    }

    /* Mic button */
    .btn-wrapper {
      display: flex;
      justify-content: center;
      margin: 8px 0;
    }

    #btn {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      position: relative;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      box-shadow: 
        0 8px 32px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.3);
      transition: all 0.3s ease;
      font-size: 2.2rem;
    }

    #btn:hover {
      transform: scale(1.08);
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 12px 40px rgba(120, 40, 200, 0.4), inset 0 1px 0 rgba(255,255,255,0.3);
    }

    #btn.listening {
      background: rgba(239, 68, 68, 0.2);
      border-color: rgba(239, 68, 68, 0.6);
      box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
      animation: pulse-ring 1.5s ease-out infinite;
    }

    #btn.thinking {
      background: rgba(168, 85, 247, 0.2);
      border-color: rgba(168, 85, 247, 0.6);
      animation: spin-glow 2s linear infinite;
    }

    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
      70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }

    @keyframes spin-glow {
      0% { box-shadow: 0 0 20px rgba(168, 85, 247, 0.6); }
      50% { box-shadow: 0 0 40px rgba(168, 85, 247, 0.9); }
      100% { box-shadow: 0 0 20px rgba(168, 85, 247, 0.6); }
    }

    /* Chat history */
    #conversation {
      width: 100%;
      max-height: 280px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-right: 4px;
    }

    #conversation::-webkit-scrollbar { width: 4px; }
    #conversation::-webkit-scrollbar-track { background: transparent; }
    #conversation::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

    .msg {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.88rem;
      line-height: 1.5;
      max-width: 88%;
      animation: fadeSlide 0.3s ease;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .user-msg {
      background: rgba(96, 165, 250, 0.15);
      border: 1px solid rgba(96, 165, 250, 0.25);
      align-self: flex-end;
      color: rgba(255,255,255,0.9);
    }

    .ai-msg {
      background: rgba(167, 139, 250, 0.15);
      border: 1px solid rgba(167, 139, 250, 0.25);
      align-self: flex-start;
      color: rgba(255,255,255,0.9);
    }

    /* Sound wave animation */
    .wave-container {
      display: none;
      justify-content: center;
      align-items: center;
      gap: 4px;
      height: 30px;
    }
    .wave-container.active { display: flex; }
    .wave-bar {
      width: 4px;
      height: 100%;
      background: linear-gradient(to top, #a78bfa, #60a5fa);
      border-radius: 2px;
      animation: wave 1.2s ease-in-out infinite;
    }
    .wave-bar:nth-child(1) { animation-delay: 0s; }
    .wave-bar:nth-child(2) { animation-delay: 0.1s; }
    .wave-bar:nth-child(3) { animation-delay: 0.2s; }
    .wave-bar:nth-child(4) { animation-delay: 0.3s; }
    .wave-bar:nth-child(5) { animation-delay: 0.4s; }

    @keyframes wave {
      0%, 100% { transform: scaleY(0.3); }
      50% { transform: scaleY(1); }
    }
  </style>
</head>
<body>

  <!-- Background orbs -->
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="container">

    <!-- Main glass card -->
    <div class="glass-card">
      <div class="header">
        <h1>🎙️ Butt's Voice Agent</h1>
        <p>AI powered by LLaMA • Urdu & English</p>
      </div>

      <br>

      <!-- Status -->
      <div id="status">Button dabao aur bolo!</div>

      <br>

      <!-- Wave animation -->
      <div class="wave-container" id="wave">
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>

      <!-- Mic button -->
      <div class="btn-wrapper">
        <button id="btn" onclick="toggleListening()">🎤</button>
      </div>

    </div>

    <!-- Chat history card -->
    <div class="glass-card">
      <div id="conversation">
        <div class="msg ai-msg">👋 Assalam o Alaikum! Main Butt's Voice Agent hoon. Mujhse kuch bhi poochhein!</div>
      </div>
    </div>

  </div>

  <script>
    let recognition;
    let isListening = false;

    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      document.getElementById('status').innerText = '❌ Chrome use karo!';
    }

    function toggleListening() {
      if (isListening) { stopListening(); } else { startListening(); }
    }

    function startListening() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SR();
      recognition.lang = 'ur-PK';
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.start();

      isListening = true;
      document.getElementById('btn').innerText = '⏹';
      document.getElementById('btn').classList.add('listening');
      document.getElementById('status').innerText = '🔴 Sun raha hoon...';
      document.getElementById('wave').classList.add('active');

      recognition.onresult = async (event) => {
        const userText = event.results[0][0].transcript;
        addMessage(userText, 'user-msg');
        document.getElementById('status').innerText = '✨ Soch raha hoon...';
        document.getElementById('btn').classList.remove('listening');
        document.getElementById('btn').classList.add('thinking');
        document.getElementById('btn').innerText = '⏳';
        document.getElementById('wave').classList.remove('active');
        stopListening();
        await getAIResponse(userText);
      };

      recognition.onerror = (e) => {
        document.getElementById('status').innerText = '❌ Dobara try karo!';
        stopListening();
      };

      recognition.onend = () => { if (isListening) stopListening(); };
    }

    function stopListening() {
      if (recognition) recognition.stop();
      isListening = false;
      document.getElementById('btn').innerText = '🎤';
      document.getElementById('btn').classList.remove('listening');
      document.getElementById('wave').classList.remove('active');
    }

    async function getAIResponse(userText) {
      try {
        const response = await fetch('/ai-response', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userText })
        });
        const data = await response.json();
        const aiText = data.response;
        document.getElementById('btn').classList.remove('thinking');
        document.getElementById('btn').innerText = '🎤';
        addMessage(aiText, 'ai-msg');
        speakText(aiText);
        document.getElementById('status').innerText = '✅ Dobara bolne ke liye button dabao!';
      } catch (error) {
        document.getElementById('btn').classList.remove('thinking');
        document.getElementById('btn').innerText = '🎤';
        document.getElementById('status').innerText = '❌ Connection error!';
      }
    }

    function speakText(text) {
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      const isUrdu = /[\u0600-\u06FF]/.test(text);
      utterance.lang = isUrdu ? 'ur-PK' : 'en-US';
      utterance.rate = 0.9;
      utterance.pitch = 1;
      utterance.volume = 1;
      setTimeout(() => window.speechSynthesis.speak(utterance), 300);
    }

    function addMessage(text, className) {
      const div = document.createElement('div');
      div.className = 'msg ' + className;
      div.innerText = (className === 'user-msg' ? '🗣️ ' : '🤖 ') + text;
      const conv = document.getElementById('conversation');
      conv.appendChild(div);
      conv.scrollTop = conv.scrollHeight;
    }
  </script>

</body>
</html>
