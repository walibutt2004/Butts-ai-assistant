<!DOCTYPE html>
<html lang="ur">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Butt's AI Assistance</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #080818;
      font-family: 'Rajdhani', sans-serif;
      color: white;
      overflow: hidden;
    }

    /* ── APP LAYOUT ── */
    .app {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 40px 20px 20px;
    }

    /* ── TOP TITLE ── */
    .top-title {
      text-align: center;
      z-index: 10;
    }
    .top-title h1 {
      font-family: 'Orbitron', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ── SPHERE CONTAINER ── */
    .sphere-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
      width: 100%;
    }

    /* ── 3D SPHERE ── */
    .sphere-wrapper {
      position: relative;
      width: 260px;
      height: 260px;
      cursor: pointer;
    }

    .sphere {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      position: relative;
      background: radial-gradient(circle at 35% 35%,
        rgba(100, 200, 255, 0.15),
        rgba(0, 100, 200, 0.4) 40%,
        rgba(0, 20, 80, 0.9) 70%,
        rgba(0, 5, 30, 1) 100%
      );
      box-shadow:
        0 0 60px rgba(0, 150, 255, 0.4),
        0 0 120px rgba(0, 100, 200, 0.2),
        inset 0 0 60px rgba(0, 50, 150, 0.5),
        inset 0 0 120px rgba(0, 0, 50, 0.8);
      animation: sphereIdle 4s ease-in-out infinite;
      overflow: hidden;
    }

    @keyframes sphereIdle {
      0%, 100% {
        box-shadow:
          0 0 60px rgba(0,150,255,0.4),
          0 0 120px rgba(0,100,200,0.2),
          inset 0 0 60px rgba(0,50,150,0.5);
      }
      50% {
        box-shadow:
          0 0 80px rgba(0,180,255,0.6),
          0 0 160px rgba(0,120,255,0.3),
          inset 0 0 80px rgba(0,80,200,0.6);
      }
    }

    .sphere.listening {
      animation: sphereListen 0.8s ease-in-out infinite;
    }
    @keyframes sphereListen {
      0%, 100% {
        box-shadow:
          0 0 80px rgba(0,200,255,0.7),
          0 0 160px rgba(0,150,255,0.4),
          inset 0 0 80px rgba(0,100,200,0.6);
        transform: scale(1);
      }
      50% {
        box-shadow:
          0 0 120px rgba(0,220,255,0.9),
          0 0 200px rgba(0,180,255,0.5),
          inset 0 0 100px rgba(0,150,255,0.7);
        transform: scale(1.03);
      }
    }

    .sphere.thinking {
      animation: sphereThink 1.5s linear infinite;
    }
    @keyframes sphereThink {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    /* Canvas inside sphere */
    #sphereCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border-radius: 50%;
      opacity: 0.7;
    }

    /* Sphere shine */
    .sphere-shine {
      position: absolute;
      top: 15%; left: 20%;
      width: 35%; height: 25%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.15), transparent);
      border-radius: 50%;
      pointer-events: none;
    }

    /* Outer ring */
    .sphere-ring {
      position: absolute;
      top: -12px; left: -12px;
      right: -12px; bottom: -12px;
      border-radius: 50%;
      border: 1px solid rgba(0, 180, 255, 0.2);
      animation: ringPulse 3s ease-in-out infinite;
    }
    .sphere-ring2 {
      position: absolute;
      top: -24px; left: -24px;
      right: -24px; bottom: -24px;
      border-radius: 50%;
      border: 1px solid rgba(0, 150, 255, 0.1);
      animation: ringPulse 3s ease-in-out infinite 1s;
    }
    @keyframes ringPulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.02); }
    }

    /* ── STATUS TEXT ── */
    .status-section {
      text-align: center;
      min-height: 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    #transcript {
      font-size: 0.9rem;
      color: rgba(100, 200, 255, 0.8);
      letter-spacing: 0.5px;
      min-height: 20px;
      font-style: italic;
      max-width: 280px;
      text-align: center;
    }

    #status {
      font-family: 'Orbitron', monospace;
      font-size: 1.1rem;
      font-weight: 700;
      color: white;
      letter-spacing: 2px;
      animation: statusGlow 2s ease-in-out infinite;
    }
    @keyframes statusGlow {
      0%, 100% { text-shadow: 0 0 10px rgba(0,180,255,0.5); }
      50% { text-shadow: 0 0 20px rgba(0,220,255,0.8), 0 0 40px rgba(0,180,255,0.4); }
    }

    /* ── MIC BUTTON ── */
    .mic-btn {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 2px solid rgba(0,180,255,0.6);
      background: rgba(0,100,200,0.2);
      color: white;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      box-shadow: 0 0 20px rgba(0,150,255,0.3);
    }
    .mic-btn:hover {
      background: rgba(0,150,255,0.3);
      box-shadow: 0 0 30px rgba(0,180,255,0.5);
    }

    /* ── CHAT PANEL ── */
    .chat-panel {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(5, 10, 30, 0.97);
      z-index: 100;
      display: none;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .chat-panel.open {
      display: flex;
      transform: translateY(0);
    }

    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(0,150,255,0.2);
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(0,10,40,0.9);
      flex-shrink: 0;
    }
    .chat-header h2 {
      font-family: 'Orbitron', monospace;
      font-size: 0.85rem;
      color: rgba(0,180,255,0.9);
      letter-spacing: 2px;
      flex: 1;
    }
    .close-chat {
      background: none;
      border: 1px solid rgba(0,150,255,0.3);
      color: rgba(0,180,255,0.8);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: 'Orbitron', monospace;
    }

    #conversation {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
    }
    #conversation::-webkit-scrollbar { width: 3px; }
    #conversation::-webkit-scrollbar-thumb {
      background: rgba(0,150,255,0.3);
      border-radius: 2px;
    }

    .msg {
      padding: 10px 14px;
      font-size: 0.88rem;
      line-height: 1.6;
      max-width: 78%;
      animation: msgIn 0.3s ease;
      word-break: break-word;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .user-msg {
      background: rgba(0,100,200,0.15);
      border: 1px solid rgba(0,150,255,0.25);
      border-radius: 14px 2px 14px 14px;
      align-self: flex-end;
    }
    .ai-msg {
      background: rgba(100,50,200,0.12);
      border: 1px solid rgba(120,80,255,0.25);
      border-radius: 2px 14px 14px 14px;
      align-self: flex-start;
    }

    .typing {
      display: flex;
      gap: 5px;
      padding: 11px 14px;
      background: rgba(100,50,200,0.12);
      border: 1px solid rgba(120,80,255,0.25);
      border-radius: 2px 14px 14px 14px;
      align-self: flex-start;
      width: fit-content;
    }
    .typing span {
      width: 6px; height: 6px;
      background: rgba(0,180,255,0.8);
      border-radius: 50%;
      animation: typingDot 1.2s ease-in-out infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingDot {
      0%,60%,100% { transform: translateY(0); opacity: 0.3; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    .chat-input-area {
      padding: 12px 16px;
      border-top: 1px solid rgba(0,150,255,0.15);
      background: rgba(0,10,40,0.95);
      flex-shrink: 0;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #textInput {
      flex: 1;
      padding: 11px 16px;
      background: rgba(0,50,120,0.2);
      border: 1px solid rgba(0,150,255,0.25);
      border-radius: 25px;
      color: white;
      font-size: 0.88rem;
      outline: none;
      font-family: 'Rajdhani', sans-serif;
      -webkit-appearance: none;
    }
    #textInput::placeholder { color: rgba(0,150,255,0.35); }
    #textInput:focus {
      border-color: rgba(0,180,255,0.6);
      box-shadow: 0 0 15px rgba(0,150,255,0.15);
    }
    #sendBtn {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: 1px solid rgba(0,150,255,0.4);
      background: rgba(0,100,200,0.2);
      color: rgba(0,180,255,0.9);
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    #sendBtn:hover {
      background: rgba(0,150,255,0.3);
      box-shadow: 0 0 15px rgba(0,150,255,0.4);
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      width: 100%;
      max-width: 340px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50px;
      padding: 10px 20px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      gap: 8px;
    }

    .nav-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.4);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      position: relative;
    }
    .nav-btn.active {
      color: rgba(0,180,255,0.9);
      background: rgba(0,150,255,0.15);
      box-shadow: 0 0 15px rgba(0,150,255,0.3);
    }
    .nav-btn:hover {
      color: rgba(0,180,255,0.7);
    }

    /* ── BACKGROUND ── */
    #bgCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ── AI RESPONSE POPUP ── */
    .response-popup {
      position: fixed;
      bottom: 160px;
      left: 50%;
      transform: translateX(-50%);
      max-width: 85%;
      background: rgba(0, 20, 60, 0.92);
      border: 1px solid rgba(0,150,255,0.3);
      border-radius: 16px;
      padding: 14px 18px;
      font-size: 0.88rem;
      line-height: 1.6;
      color: rgba(255,255,255,0.9);
      z-index: 50;
      display: none;
      animation: popupIn 0.3s ease;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 30px rgba(0,100,255,0.2);
    }
    .response-popup.show { display: block; }
    @keyframes popupIn {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>

  <canvas id="bgCanvas"></canvas>

  <!-- MAIN APP -->
  <div class="app">

    <!-- Top Title -->
    <div class="top-title">
      <h1>Butt's AI Assistance</h1>
    </div>

    <!-- Sphere Section -->
    <div class="sphere-section">

      <!-- 3D Sphere -->
      <div class="sphere-wrapper" onclick="toggleVoice()">
        <div class="sphere-ring2"></div>
        <div class="sphere-ring"></div>
        <div class="sphere" id="sphere">
          <canvas id="sphereCanvas"></canvas>
          <div class="sphere-shine"></div>
        </div>
      </div>

      <!-- Status -->
      <div class="status-section">
        <div id="transcript"></div>
        <div id="status">Tap to speak</div>
        <button class="mic-btn" onclick="toggleVoice()" id="micBtn">🎤</button>
      </div>

    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
      <button class="nav-btn active" onclick="showHome()" title="Home">🏠</button>
      <button class="nav-btn" onclick="showChat()" title="Chat">💬</button>
      <button class="nav-btn" title="Settings">⚙️</button>
      <button class="nav-btn" title="History">📋</button>
    </div>

  </div>

  <!-- AI Response Popup -->
  <div class="response-popup" id="responsePopup"></div>

  <!-- CHAT PANEL -->
  <div class="chat-panel" id="chatPanel">
    <div class="chat-header">
      <h2>💬 CHAT MODE</h2>
      <button class="close-chat" onclick="hideChat()">✕ CLOSE</button>
    </div>
    <div id="conversation">
      <div class="msg ai-msg">⚡ Assalam o Alaikum! Main Butt's AI Assistance hoon. Voice ya text — dono se baat kar sakte hain!</div>
    </div>
    <div class="chat-input-area">
      <input type="text" id="textInput" placeholder="Kuch bhi poochhein..."
        onkeydown="if(event.key==='Enter') sendText()" />
      <button id="sendBtn" onclick="sendText()">➤</button>
    </div>
  </div>

  <script>
    // ── BACKGROUND PARTICLES ──────────────────────────────
    const bgCanvas = document.getElementById('bgCanvas');
    const bgCtx = bgCanvas.getContext('2d');

    function resizeBg() {
      bgCanvas.width = window.innerWidth;
      bgCanvas.height = window.innerHeight;
    }
    resizeBg();
    window.addEventListener('resize', resizeBg);

    const stars = Array.from({length: 120}, () => ({
      x: Math.random() * bgCanvas.width,
      y: Math.random() * bgCanvas.height,
      size: Math.random() * 1.5 + 0.3,
      opacity: Math.random() * 0.6 + 0.1,
      twinkle: Math.random() * Math.PI * 2
    }));

    const bgParticles = Array.from({length: 30}, () => ({
      x: Math.random() * bgCanvas.width,
      y: Math.random() * bgCanvas.height,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      size: Math.random() * 2 + 0.5,
      color: Math.random() > 0.5 ? '0,150,255' : '100,50,255'
    }));

    let bgFrame = 0;
    function animateBg() {
      bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
      bgFrame++;

      // Stars
      stars.forEach(s => {
        s.twinkle += 0.02;
        const op = s.opacity * (0.7 + 0.3 * Math.sin(s.twinkle));
        bgCtx.beginPath();
        bgCtx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        bgCtx.fillStyle = `rgba(200,220,255,${op})`;
        bgCtx.fill();
      });

      // Particles
      bgParticles.forEach(p => {
        bgCtx.beginPath();
        bgCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        bgCtx.fillStyle = `rgba(${p.color},0.3)`;
        bgCtx.shadowBlur = 6;
        bgCtx.shadowColor = `rgba(${p.color},0.8)`;
        bgCtx.fill();
        bgCtx.shadowBlur = 0;
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > bgCanvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > bgCanvas.height) p.vy *= -1;
      });

      requestAnimationFrame(animateBg);
    }
    animateBg();

    // ── SPHERE WAVE CANVAS ────────────────────────────────
    const sc = document.getElementById('sphereCanvas');
    const sCtx = sc.getContext('2d');
    sc.width = 260; sc.height = 260;

    let waveAmplitude = 8;
    let targetAmplitude = 8;
    let waveFrame = 0;

    function animateSphere() {
      sCtx.clearRect(0, 0, 260, 260);
      waveFrame += 0.05;
      waveAmplitude += (targetAmplitude - waveAmplitude) * 0.1;

      // Draw multiple waves
      const waves = [
        { color: 'rgba(0,200,255,0.5)', offset: 0, freq: 2 },
        { color: 'rgba(150,100,255,0.4)', offset: Math.PI/3, freq: 3 },
        { color: 'rgba(0,150,255,0.3)', offset: Math.PI/1.5, freq: 1.5 },
      ];

      waves.forEach(w => {
        sCtx.beginPath();
        for (let x = 0; x <= 260; x += 2) {
          const y = 130 +
            Math.sin(x * 0.04 * w.freq + waveFrame + w.offset) * waveAmplitude +
            Math.sin(x * 0.02 + waveFrame * 0.7 + w.offset) * (waveAmplitude * 0.5);
          if (x === 0) sCtx.moveTo(x, y);
          else sCtx.lineTo(x, y);
        }
        sCtx.strokeStyle = w.color;
        sCtx.lineWidth = 2;
        sCtx.shadowBlur = 10;
        sCtx.shadowColor = w.color;
        sCtx.stroke();
        sCtx.shadowBlur = 0;
      });

      // Particle dots inside sphere
      if (waveFrame % 0.5 < 0.05) {
        sCtx.beginPath();
        const px = Math.random() * 260;
        const py = Math.random() * 260;
        sCtx.arc(px, py, Math.random() * 2 + 0.5, 0, Math.PI * 2);
        sCtx.fillStyle = 'rgba(100,200,255,0.3)';
        sCtx.fill();
      }

      requestAnimationFrame(animateSphere);
    }
    animateSphere();

    // ── NAVIGATION ────────────────────────────────────────
    function showHome() {
      hideChat();
      document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', i===0));
    }

    function showChat() {
      const panel = document.getElementById('chatPanel');
      panel.style.display = 'flex';
      setTimeout(() => panel.classList.add('open'), 10);
      document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', i===1));
    }

    function hideChat() {
      const panel = document.getElementById('chatPanel');
      panel.classList.remove('open');
      setTimeout(() => panel.style.display = 'none', 400);
      document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', i===0));
    }

    // ── VOICE ─────────────────────────────────────────────
    let recognition, isListening = false;

    function toggleVoice() {
      if (isListening) stopVoice(); else startVoice();
    }

    function startVoice() {
      if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
        setStatus('Chrome use karo!'); return;
      }
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SR();
      recognition.lang = 'ur-PK';
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.start();

      isListening = true;
      targetAmplitude = 35;
      document.getElementById('sphere').classList.add('listening');
      document.getElementById('micBtn').textContent = '⏹';
      setStatus('Listening...');
      setTranscript('');

      recognition.onresult = async (e) => {
        const interim = Array.from(e.results).map(r => r[0].transcript).join('');
        setTranscript(interim);
        if (e.results[e.results.length-1].isFinal) {
          const text = e.results[e.results.length-1][0].transcript;
          stopVoice();
          addMsg(text, 'user-msg');
          await getResponse(text, true);
        }
      };
      recognition.onerror = () => { stopVoice(); setStatus('Tap to speak'); };
      recognition.onend   = () => { if (isListening) stopVoice(); };
    }

    function stopVoice() {
      if (recognition) recognition.stop();
      isListening = false;
      targetAmplitude = 8;
      document.getElementById('sphere').classList.remove('listening');
      document.getElementById('sphere').classList.remove('thinking');
      document.getElementById('micBtn').textContent = '🎤';
    }

    // ── TEXT ──────────────────────────────────────────────
    function sendText() {
      const input = document.getElementById('textInput');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      addMsg(text, 'user-msg');
      getResponse(text, false);
    }

    // ── AI RESPONSE ───────────────────────────────────────
    async function getResponse(text, speakOut) {
      document.getElementById('sphere').classList.add('thinking');
      targetAmplitude = 20;
      setStatus('Processing...');
      setTranscript('');

      const typing = document.createElement('div');
      typing.className = 'typing'; typing.id = 'typing';
      typing.innerHTML = '<span></span><span></span><span></span>';
      document.getElementById('conversation').appendChild(typing);
      scrollDown();

      try {
        const res  = await fetch('/ai-response', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userText: text })
        });
        const data = await res.json();
        document.getElementById('typing')?.remove();
        document.getElementById('sphere').classList.remove('thinking');

        addMsg(data.response, 'ai-msg');
        showPopup(data.response);

        if (speakOut) {
          speakText(data.response);
          setStatus('Speaking...');
          targetAmplitude = 25;
        } else {
          setStatus('Tap to speak');
          targetAmplitude = 8;
        }
      } catch {
        document.getElementById('typing')?.remove();
        document.getElementById('sphere').classList.remove('thinking');
        setStatus('Error — retry karo');
        targetAmplitude = 8;
      }
    }

    // ── POPUP ─────────────────────────────────────────────
    let popupTimer;
    function showPopup(text) {
      const popup = document.getElementById('responsePopup');
      popup.textContent = '⚡ ' + text;
      popup.classList.add('show');
      clearTimeout(popupTimer);
      popupTimer = setTimeout(() => popup.classList.remove('show'), 6000);
    }

    // ── SPEAK ─────────────────────────────────────────────
    function speakText(text) {
      window.speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(text);
      utt.lang   = /[\u0600-\u06FF]/.test(text) ? 'ur-PK' : 'en-US';
      utt.rate   = 0.88; utt.pitch = 1; utt.volume = 1;
      utt.onend  = () => { setStatus('Tap to speak'); targetAmplitude = 8; };
      setTimeout(() => window.speechSynthesis.speak(utt), 200);
    }

    // ── HELPERS ───────────────────────────────────────────
    function addMsg(text, cls) {
      const div = document.createElement('div');
      div.className = 'msg ' + cls;
      div.textContent = (cls === 'user-msg' ? '▶ ' : '⚡ ') + text;
      document.getElementById('conversation').appendChild(div);
      scrollDown();
    }
    function scrollDown() {
      const c = document.getElementById('conversation');
      c.scrollTop = c.scrollHeight;
    }
    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }
    function setTranscript(msg) {
      document.getElementById('transcript').textContent = msg;
    }

    // Mobile viewport fix
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', () => {
        document.querySelector('.app').style.height = window.visualViewport.height + 'px';
      });
    }
  </script>
</body>
</html>
